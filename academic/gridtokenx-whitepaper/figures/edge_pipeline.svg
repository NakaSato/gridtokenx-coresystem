<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#e8edf8"/>
    </linearGradient>
    <linearGradient id="g-phy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43a047"/><stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="g-gw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/><stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="g-envoy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb8c00"/><stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="g-oracle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8e24aa"/><stop offset="100%" stop-color="#6a1b9a"/>
    </linearGradient>
    <linearGradient id="g-kafka" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d81b60"/><stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arr" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#546e7a"/>
    </marker>
    <marker id="arr-red" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#c62828"/>
    </marker>
  </defs>

  <rect width="960" height="360" fill="url(#bg)" rx="12"/>
  <text x="480" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a237e">IoT Edge Ingestion Pipeline</text>
  <line x1="60" y1="42" x2="900" y2="42" stroke="#c5cae9" stroke-width="1"/>

  <!-- ══ Stage 1: Physical ══ -->
  <rect x="18" y="56" width="158" height="248" rx="10" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="18" y="56" width="158" height="32" rx="10" fill="url(#g-phy)"/>
  <rect x="18" y="76" width="158" height="12" fill="url(#g-phy)"/>
  <text x="97" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">Physical Layer</text>

  <rect x="30" y="100" width="134" height="40" rx="7" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="97" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Smart Meter</text>
  <text x="97" y="131" text-anchor="middle" font-size="10" fill="#666">DLMS/COSEM</text>

  <rect x="30" y="148" width="134" height="40" rx="7" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="97" y="164" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">EV Charger</text>
  <text x="97" y="179" text-anchor="middle" font-size="10" fill="#666">OCPP 2.0.1</text>

  <rect x="30" y="196" width="134" height="40" rx="7" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="97" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Solar Inverter</text>
  <text x="97" y="227" text-anchor="middle" font-size="10" fill="#666">Modbus TCP</text>

  <rect x="30" y="244" width="134" height="40" rx="7" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="97" y="260" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">BESS</text>
  <text x="97" y="275" text-anchor="middle" font-size="10" fill="#666">Modbus TCP</text>

  <!-- Arrow 1→2 -->
  <line x1="176" y1="180" x2="200" y2="180" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══ Stage 2: Edge Gateway ══ -->
  <rect x="200" y="56" width="168" height="248" rx="10" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="200" y="56" width="168" height="32" rx="10" fill="url(#g-gw)"/>
  <rect x="200" y="76" width="168" height="12" fill="url(#g-gw)"/>
  <text x="284" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">Edge Gateway</text>

  <rect x="212" y="100" width="144" height="34" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="284" y="121" text-anchor="middle" font-size="10" fill="#555">Protocol Adapters</text>

  <rect x="212" y="142" width="144" height="34" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="284" y="163" text-anchor="middle" font-size="10" fill="#555">Normalizer (JSON)</text>

  <rect x="212" y="184" width="144" height="34" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="284" y="200" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">HSM Ed25519 Sign</text>
  <text x="284" y="213" text-anchor="middle" font-size="9" fill="#888">Key never leaves HSM</text>

  <rect x="212" y="226" width="144" height="34" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="284" y="242" text-anchor="middle" font-size="10" fill="#555">Local WAL Buffer</text>
  <text x="284" y="255" text-anchor="middle" font-size="9" fill="#888">72h offline resilience</text>

  <!-- Arrow 2→3 with label -->
  <line x1="368" y1="180" x2="392" y2="180" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="368" y="160" width="24" height="18" rx="3" fill="#eceff1"/>
  <text x="380" y="172" text-anchor="middle" font-size="8" fill="#546e7a">mTLS</text>

  <!-- ══ Stage 3: Envoy ══ -->
  <rect x="392" y="100" width="148" height="160" rx="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="392" y="100" width="148" height="32" rx="10" fill="url(#g-envoy)"/>
  <rect x="392" y="120" width="148" height="12" fill="url(#g-envoy)"/>
  <text x="466" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="white">Envoy Proxy</text>

  <rect x="404" y="144" width="124" height="28" rx="5" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="466" y="162" text-anchor="middle" font-size="10" fill="#555">mTLS termination</text>

  <rect x="404" y="178" width="124" height="28" rx="5" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="466" y="196" text-anchor="middle" font-size="10" fill="#555">Rate limiting</text>

  <rect x="404" y="212" width="124" height="28" rx="5" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="466" y="230" text-anchor="middle" font-size="10" fill="#555">Cert CN validation</text>

  <!-- Arrow 3→4 -->
  <line x1="540" y1="180" x2="564" y2="180" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══ Stage 4: Oracle Bridge ══ -->
  <rect x="564" y="56" width="168" height="248" rx="10" fill="#f3e5f5" stroke="#ce93d8" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="564" y="56" width="168" height="32" rx="10" fill="url(#g-oracle)"/>
  <rect x="564" y="76" width="168" height="12" fill="url(#g-oracle)"/>
  <text x="648" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">Oracle Bridge</text>

  <rect x="576" y="100" width="144" height="28" rx="6" fill="white" stroke="#ba68c8" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="648" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#6a1b9a">Ed25519 verify</text>

  <rect x="576" y="134" width="144" height="28" rx="6" fill="white" stroke="#ba68c8" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="648" y="152" text-anchor="middle" font-size="10" fill="#555">Schema validation</text>

  <rect x="576" y="168" width="144" height="28" rx="6" fill="white" stroke="#ba68c8" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="648" y="186" text-anchor="middle" font-size="10" fill="#555">Seq# dedup (Redis)</text>

  <rect x="576" y="202" width="144" height="28" rx="6" fill="white" stroke="#ba68c8" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="648" y="220" text-anchor="middle" font-size="10" fill="#555">Anomaly detection</text>

  <rect x="576" y="236" width="144" height="28" rx="6" fill="white" stroke="#ba68c8" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="648" y="254" text-anchor="middle" font-size="10" fill="#555">Exactly-once → Kafka</text>

  <!-- Reject path -->
  <rect x="576" y="310" width="144" height="30" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="648" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#c62828">Quarantine / Alert</text>
  <line x1="648" y1="304" x2="648" y2="308" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <text x="648" y="302" text-anchor="middle" font-size="9" fill="#c62828">invalid sig / anomaly</text>

  <!-- Arrow 4→5 -->
  <line x1="732" y1="180" x2="756" y2="180" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══ Stage 5: Kafka ══ -->
  <rect x="756" y="56" width="186" height="248" rx="10" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="756" y="56" width="186" height="32" rx="10" fill="url(#g-kafka)"/>
  <rect x="756" y="76" width="186" height="12" fill="url(#g-kafka)"/>
  <text x="849" y="76" text-anchor="middle" font-size="12" font-weight="700" fill="white">Kafka + Consumers</text>

  <rect x="768" y="100" width="162" height="30" rx="6" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="849" y="119" text-anchor="middle" font-size="10" font-weight="600" fill="#880e4f">energy.telemetry</text>

  <rect x="768" y="138" width="162" height="30" rx="6" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="849" y="157" text-anchor="middle" font-size="10" fill="#555">Trading Service</text>

  <rect x="768" y="176" width="162" height="30" rx="6" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="849" y="195" text-anchor="middle" font-size="10" fill="#555">Oracle Program (Solana)</text>

  <rect x="768" y="214" width="162" height="30" rx="6" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="849" y="233" text-anchor="middle" font-size="10" fill="#555">ClickHouse Analytics</text>

  <rect x="768" y="252" width="162" height="30" rx="6" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="849" y="271" text-anchor="middle" font-size="10" fill="#555">Notification Service</text>

  <!-- Footer -->
  <text x="480" y="348" text-anchor="middle" font-size="10" fill="#90a4ae">All edge-to-cloud communication secured via mTLS · Hardware-issued client certificates · Ed25519 device signing</text>
</svg>
