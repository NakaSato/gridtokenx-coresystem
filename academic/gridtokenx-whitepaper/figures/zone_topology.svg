<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#e8edf8"/>
    </linearGradient>
    <linearGradient id="g-hv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb8c00"/><stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="g-mv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/><stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="g-lv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43a047"/><stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arr-hv" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#e65100"/>
    </marker>
    <marker id="arr-mv" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#1565c0"/>
    </marker>
    <marker id="arr-g" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-b" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#1565c0"/>
    </marker>
    <marker id="arr-o" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="url(#bg)" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a237e">Grid Zone Topology and Wheeling Charge Model</text>
  <line x1="60" y1="42" x2="840" y2="42" stroke="#c5cae9" stroke-width="1"/>

  <!-- ══ HV Zone ══ -->
  <rect x="180" y="54" width="540" height="62" rx="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="2" filter="url(#shadow)"/>
  <rect x="180" y="54" width="540" height="28" rx="10" fill="url(#g-hv)"/>
  <rect x="180" y="72" width="540" height="10" fill="url(#g-hv)"/>
  <text x="450" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">High-Voltage Zone (115–230 kV) — EGAT Transmission Backbone</text>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#bf360c">Backbone interconnect — not directly traded · Connects to national grid</text>

  <!-- HV → MV lines -->
  <line x1="280" y1="116" x2="200" y2="152" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-hv)"/>
  <line x1="450" y1="116" x2="450" y2="152" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-hv)"/>
  <line x1="620" y1="116" x2="700" y2="152" stroke="#e65100" stroke-width="2.5" marker-end="url(#arr-hv)"/>

  <!-- ══ MV Zones ══ -->
  <rect x="80" y="152" width="200" height="68" rx="10" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="80" y="152" width="200" height="26" rx="10" fill="url(#g-mv)"/>
  <rect x="80" y="168" width="200" height="10" fill="url(#g-mv)"/>
  <text x="180" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="white">MV Zone A</text>
  <text x="180" y="192" text-anchor="middle" font-size="10" fill="#1565c0">22 kV feeder — PEA North</text>
  <text x="180" y="208" text-anchor="middle" font-size="10" fill="#888">Capacity: 5 MW</text>

  <rect x="350" y="152" width="200" height="68" rx="10" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="350" y="152" width="200" height="26" rx="10" fill="url(#g-mv)"/>
  <rect x="350" y="168" width="200" height="10" fill="url(#g-mv)"/>
  <text x="450" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="white">MV Zone B</text>
  <text x="450" y="192" text-anchor="middle" font-size="10" fill="#1565c0">22 kV feeder — PEA Central</text>
  <text x="450" y="208" text-anchor="middle" font-size="10" fill="#888">Capacity: 8 MW</text>

  <rect x="620" y="152" width="200" height="68" rx="10" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="620" y="152" width="200" height="26" rx="10" fill="url(#g-mv)"/>
  <rect x="620" y="168" width="200" height="10" fill="url(#g-mv)"/>
  <text x="720" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="white">MV Zone C</text>
  <text x="720" y="192" text-anchor="middle" font-size="10" fill="#1565c0">22 kV feeder — PEA East</text>
  <text x="720" y="208" text-anchor="middle" font-size="10" fill="#888">Capacity: 4 MW</text>

  <!-- MV → LV lines -->
  <line x1="148" y1="220" x2="118" y2="258" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr-mv)"/>
  <line x1="212" y1="220" x2="242" y2="258" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr-mv)"/>
  <line x1="418" y1="220" x2="388" y2="258" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr-mv)"/>
  <line x1="482" y1="220" x2="512" y2="258" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr-mv)"/>
  <line x1="688" y1="220" x2="658" y2="258" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr-mv)"/>
  <line x1="752" y1="220" x2="782" y2="258" stroke="#1565c0" stroke-width="1.8" marker-end="url(#arr-mv)"/>

  <!-- ══ LV Zones ══ -->
  <!-- LV-A1 -->
  <rect x="60" y="258" width="118" height="82" rx="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="258" width="118" height="24" rx="9" fill="url(#g-lv)"/>
  <rect x="60" y="272" width="118" height="10" fill="url(#g-lv)"/>
  <text x="119" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="white">LV-A1</text>
  <text x="119" y="296" text-anchor="middle" font-size="10" fill="#2e7d32">380V transformer</text>
  <text x="119" y="310" text-anchor="middle" font-size="10" fill="#555">48 prosumers</text>
  <text x="119" y="324" text-anchor="middle" font-size="9" fill="#888">Cap: 120 kW</text>

  <!-- LV-A2 -->
  <rect x="192" y="258" width="118" height="82" rx="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="192" y="258" width="118" height="24" rx="9" fill="url(#g-lv)"/>
  <rect x="192" y="272" width="118" height="10" fill="url(#g-lv)"/>
  <text x="251" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="white">LV-A2</text>
  <text x="251" y="296" text-anchor="middle" font-size="10" fill="#2e7d32">380V transformer</text>
  <text x="251" y="310" text-anchor="middle" font-size="10" fill="#555">62 prosumers</text>
  <text x="251" y="324" text-anchor="middle" font-size="9" fill="#888">Cap: 200 kW</text>

  <!-- LV-B1 -->
  <rect x="330" y="258" width="118" height="82" rx="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="330" y="258" width="118" height="24" rx="9" fill="url(#g-lv)"/>
  <rect x="330" y="272" width="118" height="10" fill="url(#g-lv)"/>
  <text x="389" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="white">LV-B1</text>
  <text x="389" y="296" text-anchor="middle" font-size="10" fill="#2e7d32">380V transformer</text>
  <text x="389" y="310" text-anchor="middle" font-size="10" fill="#555">35 prosumers</text>
  <text x="389" y="324" text-anchor="middle" font-size="9" fill="#888">Cap: 90 kW</text>

  <!-- LV-B2 -->
  <rect x="462" y="258" width="118" height="82" rx="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="462" y="258" width="118" height="24" rx="9" fill="url(#g-lv)"/>
  <rect x="462" y="272" width="118" height="10" fill="url(#g-lv)"/>
  <text x="521" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="white">LV-B2</text>
  <text x="521" y="296" text-anchor="middle" font-size="10" fill="#2e7d32">380V transformer</text>
  <text x="521" y="310" text-anchor="middle" font-size="10" fill="#555">71 prosumers</text>
  <text x="521" y="324" text-anchor="middle" font-size="9" fill="#888">Cap: 250 kW</text>

  <!-- LV-C1 -->
  <rect x="600" y="258" width="118" height="82" rx="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="600" y="258" width="118" height="24" rx="9" fill="url(#g-lv)"/>
  <rect x="600" y="272" width="118" height="10" fill="url(#g-lv)"/>
  <text x="659" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="white">LV-C1</text>
  <text x="659" y="296" text-anchor="middle" font-size="10" fill="#2e7d32">380V transformer</text>
  <text x="659" y="310" text-anchor="middle" font-size="10" fill="#555">29 prosumers</text>
  <text x="659" y="324" text-anchor="middle" font-size="9" fill="#888">Cap: 80 kW</text>

  <!-- LV-C2 -->
  <rect x="732" y="258" width="118" height="82" rx="9" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="732" y="258" width="118" height="24" rx="9" fill="url(#g-lv)"/>
  <rect x="732" y="272" width="118" height="10" fill="url(#g-lv)"/>
  <text x="791" y="272" text-anchor="middle" font-size="11" font-weight="700" fill="white">LV-C2</text>
  <text x="791" y="296" text-anchor="middle" font-size="10" fill="#2e7d32">380V transformer</text>
  <text x="791" y="310" text-anchor="middle" font-size="10" fill="#555">44 prosumers</text>
  <text x="791" y="324" text-anchor="middle" font-size="9" fill="#888">Cap: 150 kW</text>

  <!-- ══ Wheeling charge legend ══ -->
  <!-- Intra-zone arc -->
  <path d="M 178 340 Q 185 370 251 340" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-dasharray="none" marker-end="url(#arr-g)"/>
  <rect x="162" y="372" width="108" height="34" rx="8" fill="#e8f5e9" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="216" y="387" text-anchor="middle" font-size="10" font-weight="700" fill="#2e7d32">Intra-zone (d=0)</text>
  <text x="216" y="400" text-anchor="middle" font-size="10" fill="#2e7d32">0.50 THB/kWh</text>

  <!-- Adjacent arc -->
  <path d="M 310 299 Q 320 360 330 299" fill="none" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <rect x="290" y="372" width="108" height="34" rx="8" fill="#e3f2fd" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="344" y="387" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">Adjacent (d=1)</text>
  <text x="344" y="400" text-anchor="middle" font-size="10" fill="#1565c0">1.00 THB/kWh</text>

  <!-- Distant arc -->
  <path d="M 119 340 Q 455 430 791 340" fill="none" stroke="#e65100" stroke-width="2" stroke-dasharray="7,4" marker-end="url(#arr-o)"/>
  <rect x="396" y="418" width="108" height="34" rx="8" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="450" y="433" text-anchor="middle" font-size="10" font-weight="700" fill="#e65100">Distant (d=4)</text>
  <text x="450" y="446" text-anchor="middle" font-size="10" fill="#e65100">1.90 THB/kWh</text>
</svg>
