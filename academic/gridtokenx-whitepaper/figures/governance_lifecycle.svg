<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/><stop offset="100%" stop-color="#e8edf8"/>
    </linearGradient>
    <linearGradient id="g-draft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78909c"/><stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
    <linearGradient id="g-vote" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/><stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="g-queue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb8c00"/><stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="g-exec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43a047"/><stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="g-emerg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d81b60"/><stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="g-defeat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/><stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000015"/>
    </filter>
    <marker id="arr" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#546e7a"/>
    </marker>
    <marker id="arr-g" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-r" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#c62828"/>
    </marker>
    <marker id="arr-pink" markerWidth="12" markerHeight="10" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 L2.5,4 Z" fill="#880e4f"/>
    </marker>
  </defs>

  <rect width="920" height="380" fill="url(#bg)" rx="12"/>
  <text x="460" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#1a237e">Governance Proposal Lifecycle</text>
  <line x1="60" y1="42" x2="860" y2="42" stroke="#c5cae9" stroke-width="1"/>

  <!-- ══ Stage 1: Draft ══ -->
  <rect x="30" y="60" width="148" height="148" rx="10" fill="#eceff1" stroke="#b0bec5" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="60" width="148" height="32" rx="10" fill="url(#g-draft)"/>
  <rect x="30" y="80" width="148" height="12" fill="url(#g-draft)"/>
  <text x="104" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="white">① Draft</text>

  <rect x="42" y="104" width="124" height="28" rx="6" fill="white" stroke="#b0bec5" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="104" y="122" text-anchor="middle" font-size="10" fill="#555">Stake 1,000 GRX</text>

  <rect x="42" y="138" width="124" height="28" rx="6" fill="white" stroke="#b0bec5" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="104" y="156" text-anchor="middle" font-size="10" fill="#555">Any GRX holder</text>

  <rect x="42" y="172" width="124" height="28" rx="6" fill="white" stroke="#b0bec5" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="104" y="190" text-anchor="middle" font-size="10" fill="#555">Describe change</text>

  <!-- Arrow 1→2 -->
  <line x1="178" y1="134" x2="210" y2="134" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="178" y="118" width="32" height="14" rx="3" fill="#eceff1"/>
  <text x="194" y="128" text-anchor="middle" font-size="9" fill="#546e7a">submit</text>

  <!-- ══ Stage 2: Active Voting ══ -->
  <rect x="210" y="48" width="180" height="180" rx="10" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="210" y="48" width="180" height="32" rx="10" fill="url(#g-vote)"/>
  <rect x="210" y="68" width="180" height="12" fill="url(#g-vote)"/>
  <text x="300" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="white">② Active Voting</text>

  <rect x="222" y="92" width="156" height="28" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="300" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#1565c0">7-day voting window</text>

  <rect x="222" y="126" width="156" height="28" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="300" y="144" text-anchor="middle" font-size="10" fill="#555">GRX-weighted votes</text>

  <rect x="222" y="160" width="156" height="28" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="300" y="178" text-anchor="middle" font-size="10" fill="#555">Quorum: 10% staked GRX</text>

  <rect x="222" y="194" width="156" height="28" rx="6" fill="white" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="300" y="212" text-anchor="middle" font-size="10" fill="#555">Threshold: 60% FOR</text>

  <!-- Arrow 2→3 (passed) -->
  <line x1="390" y1="110" x2="422" y2="110" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-g)"/>
  <rect x="390" y="94" width="32" height="14" rx="3" fill="#e8f5e9"/>
  <text x="406" y="104" text-anchor="middle" font-size="9" fill="#2e7d32">passed</text>

  <!-- Arrow 2→defeated -->
  <line x1="390" y1="200" x2="422" y2="240" stroke="#c62828" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="418" y="228" text-anchor="middle" font-size="9" fill="#c62828">failed</text>

  <!-- Defeated box -->
  <rect x="422" y="240" width="148" height="68" rx="10" fill="#ffebee" stroke="#ef9a9a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="422" y="240" width="148" height="28" rx="10" fill="url(#g-defeat)"/>
  <rect x="422" y="258" width="148" height="10" fill="url(#g-defeat)"/>
  <text x="496" y="258" text-anchor="middle" font-size="12" font-weight="700" fill="white">Defeated</text>
  <text x="496" y="284" text-anchor="middle" font-size="10" fill="#c62828">Stake returned</text>
  <text x="496" y="298" text-anchor="middle" font-size="10" fill="#888">Proposal archived</text>

  <!-- ══ Stage 3: Queued ══ -->
  <rect x="422" y="60" width="168" height="148" rx="10" fill="#fff3e0" stroke="#ffcc80" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="422" y="60" width="168" height="32" rx="10" fill="url(#g-queue)"/>
  <rect x="422" y="80" width="168" height="12" fill="url(#g-queue)"/>
  <text x="506" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="white">③ Queued</text>

  <rect x="434" y="104" width="144" height="28" rx="6" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="506" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#e65100">48-hour timelock</text>

  <rect x="434" y="138" width="144" height="28" rx="6" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="506" y="156" text-anchor="middle" font-size="10" fill="#555">Community review period</text>

  <rect x="434" y="172" width="144" height="28" rx="6" fill="white" stroke="#ffb74d" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="506" y="190" text-anchor="middle" font-size="10" fill="#555">Exit window for holders</text>

  <!-- Arrow 3→4 -->
  <line x1="590" y1="134" x2="622" y2="134" stroke="#546e7a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="590" y="118" width="32" height="14" rx="3" fill="#eceff1"/>
  <text x="606" y="128" text-anchor="middle" font-size="9" fill="#546e7a">execute</text>

  <!-- ══ Stage 4: Executed ══ -->
  <rect x="622" y="60" width="168" height="148" rx="10" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="622" y="60" width="168" height="32" rx="10" fill="url(#g-exec)"/>
  <rect x="622" y="80" width="168" height="12" fill="url(#g-exec)"/>
  <text x="706" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="white">④ Executed</text>

  <rect x="634" y="104" width="144" height="28" rx="6" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="706" y="122" text-anchor="middle" font-size="10" fill="#555">ProtocolConfig PDA updated</text>

  <rect x="634" y="138" width="144" height="28" rx="6" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="706" y="156" text-anchor="middle" font-size="10" fill="#555">Stake returned to proposer</text>

  <rect x="634" y="172" width="144" height="28" rx="6" fill="white" stroke="#81c784" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="706" y="190" text-anchor="middle" font-size="10" fill="#555">On-chain event emitted</text>

  <!-- ══ Emergency Multisig ══ -->
  <rect x="800" y="48" width="106" height="180" rx="10" fill="#fce4ec" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="800" y="48" width="106" height="32" rx="10" fill="url(#g-emerg)"/>
  <rect x="800" y="68" width="106" height="12" fill="url(#g-emerg)"/>
  <text x="853" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="white">Emergency</text>

  <rect x="810" y="92" width="86" height="28" rx="5" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="853" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#880e4f">Market Pause</text>

  <rect x="810" y="126" width="86" height="28" rx="5" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="853" y="140" text-anchor="middle" font-size="9" fill="#555">5-of-9 required</text>

  <rect x="810" y="160" width="86" height="28" rx="5" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="853" y="174" text-anchor="middle" font-size="9" font-weight="600" fill="#880e4f">Program Freeze</text>

  <rect x="810" y="194" width="86" height="28" rx="5" fill="white" stroke="#f48fb1" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="853" y="208" text-anchor="middle" font-size="9" fill="#555">7-of-9 required</text>

  <!-- Emergency bypass arrow -->
  <path d="M 706 208 Q 706 240 853 240 L 853 228" fill="none" stroke="#880e4f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-pink)"/>
  <rect x="720" y="244" width="120" height="16" rx="8" fill="#fce4ec"/>
  <text x="780" y="255" text-anchor="middle" font-size="9" fill="#880e4f">critical incident bypass</text>

  <!-- ══ Governable Parameters ══ -->
  <rect x="30" y="270" width="380" height="90" rx="10" fill="#f9fbe7" stroke="#dce775" stroke-width="1.5" filter="url(#shadow-sm)"/>
  <text x="220" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#827717">Governable Parameters (via Proposal)</text>
  <text x="80" y="312" text-anchor="middle" font-size="10" fill="#555">Market fee rate</text>
  <text x="80" y="326" text-anchor="middle" font-size="9" fill="#888">default 0.10%</text>
  <text x="180" y="312" text-anchor="middle" font-size="10" fill="#555">Wheeling charges</text>
  <text x="180" y="326" text-anchor="middle" font-size="9" fill="#888">multipliers</text>
  <text x="280" y="312" text-anchor="middle" font-size="10" fill="#555">GRX staking min</text>
  <text x="280" y="326" text-anchor="middle" font-size="9" fill="#888">by role</text>
  <text x="370" y="312" text-anchor="middle" font-size="10" fill="#555">Program upgrade</text>
  <text x="370" y="326" text-anchor="middle" font-size="9" fill="#888">authority</text>
  <text x="80" y="348" text-anchor="middle" font-size="10" fill="#555">REC validators</text>
  <text x="180" y="348" text-anchor="middle" font-size="10" fill="#555">VPP capacity limits</text>
  <text x="280" y="348" text-anchor="middle" font-size="10" fill="#555">Zone distance rates</text>
  <text x="370" y="348" text-anchor="middle" font-size="10" fill="#555">Treasury allocation</text>
</svg>
