# Minimal Envoy edge config (dev bring-up stub).
# The repo's docker-compose bind-mounts this file into the envoy container, but no
# config was checked in (docker had auto-created an empty dir in its place, which
# breaks the file bind-mount). This stub lets the container boot so the rest of the
# stack can come up. It is NOT a real mTLS/IoT edge config — replace before relying
# on the :4002 edge path.
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: edge
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: edge
                route_config:
                  name: local
                  virtual_hosts:
                    - name: local
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          direct_response:
                            status: 200
                            body: { inline_string: "ok" }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
