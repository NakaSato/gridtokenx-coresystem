# Envoy edge config — mTLS-enforcing IoT edge for the :4002 path.
#
# The :10000 (host :4002) listener requires a client certificate chaining to the
# dev CA (infra/certs/ca.crt) — `require_client_certificate: true`. Plaintext and
# client-certless connections are rejected at the TLS layer. Authenticated
# requests are proxied to the Aggregator IoT gateway (the device-ingest backend),
# closing TD-003: the edge now both ENFORCES mTLS and ROUTES to the real upstream.
#
# Certs (bind-mounted read-only by docker-compose; ca.key is NEVER mounted):
#   /etc/envoy/certs/server.{crt,key}  — edge server identity (SAN: localhost)
#   /etc/envoy/certs/ca.crt            — trust root for client certs
#
# Upstream: aggregator-bridge:4010 (its in-container REST IoT gateway; host-mapped
# to :4030). Same docker networks (edge-tier + gridtokenx-network), so the compose
# service name resolves. The Aggregator still runs its own API-key + Ed25519
# device-signature checks — the edge mTLS is the transport-layer gate in front.
#
# RESIDUAL (TD-003): the client's SPIFFE SAN is not yet mapped to a device/role
# (no SAN→identity header injection like chain-bridge's PeerCertLayer).
admin:
  address:
    socket_address: { address: 0.0.0.0, port_value: 9901 }

static_resources:
  listeners:
    - name: edge
      address:
        socket_address: { address: 0.0.0.0, port_value: 10000 }
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              # Reject any client that does not present a cert chaining to the CA.
              require_client_certificate: true
              common_tls_context:
                tls_certificates:
                  - certificate_chain: { filename: /etc/envoy/certs/server.crt }
                    private_key: { filename: /etc/envoy/certs/server.key }
                validation_context:
                  trusted_ca: { filename: /etc/envoy/certs/ca.crt }
          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: edge
                route_config:
                  name: local
                  virtual_hosts:
                    - name: local
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route: { cluster: aggregator_iot }
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: aggregator_iot
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: aggregator_iot
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: aggregator-bridge, port_value: 4010 }
