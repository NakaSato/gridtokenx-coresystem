# GridTokenX NATS server config — blockchain TX bus
# (chain.tx.submit / chain.tx.cancel / chain.tx.mint).
#
# Mounted read-only into the `nats` compose service. Credentials come from the
# NATS_USER / NATS_PASSWORD environment variables set on the container (dev
# defaults live in docker-compose.yml; override via .env for anything real).
# Every client — chain-bridge, aggregator-bridge, host-side e2e tests and
# scripts — authenticates with a user:pass NATS URL.

port: 4222
http_port: 8222

jetstream {
    store_dir: /data
    # Bound stream storage so a runaway publisher can't fill the volume or
    # blow the container's 384M memory cap.
    max_memory_store: 128MB
    max_file_store: 2GB
}

authorization {
    user: $NATS_USER
    password: $NATS_PASSWORD
}
