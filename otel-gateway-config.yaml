receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 5000
    timeout: 2s

  memory_limiter:
    check_interval: 1s
    limit_mib: 4096
    spike_limit_mib: 1024

  # Tail-based sampling: Keep 100% of errors, 5% of successful traces
  tail_sampling:
    decision_wait: 10s
    num_traces: 100
    expected_new_traces_per_sec: 10
    policies:
      - name: errors-policy
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: probabilistic-policy
        type: probabilistic
        probabilistic: {sampling_percentage: 100}

connectors:
  # Generate metrics from spans (latency, rate, error)
  spanmetrics:
    histogram:
      explicit:
        buckets: [1ms, 10ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s]

exporters:
  debug:
    verbosity: detailed

  prometheusremotewrite:
    endpoint: "http://gridtokenx-prometheus:9090/api/v1/write"
    resource_to_telemetry_conversion:
      enabled: true
  
  loki:
    endpoint: "http://gridtokenx-loki:3100/loki/api/v1/push"
    default_labels_enabled:
      exporter: true
      job: true
      instance: true
      level: true
  
  otlp/tempo:
    endpoint: "gridtokenx-tempo:4317"
    tls:
      insecure: true

service:
  telemetry:
    logs:
      level: debug
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch]
      exporters: [otlp/tempo, spanmetrics, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite, debug]
    metrics/spanmetrics:
      receivers: [spanmetrics]
      processors: [batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, debug]
