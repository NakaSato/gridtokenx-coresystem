apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: telemetry-ingest-allow
  namespace: gridtokenx-prod
spec:
  selector:
    matchLabels:
      app: telemetry-ingest
  action: ALLOW
  rules:
  - from:
    - source:
        # Strictly from the Edge Envoy gateway
        principals: ["spiffe://gridtokenx.th/prod/edge-gateway"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: oracle-bridge-allow
  namespace: gridtokenx-prod
spec:
  selector:
    matchLabels:
      app: oracle-bridge
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["spiffe://gridtokenx.th/prod/reporting-service", "spiffe://gridtokenx.th/prod/compliance-service", "spiffe://gridtokenx.th/prod/trading-service/api"]
    to:
    - operation:
        # Allow internal services to query attestation state
        paths: ["/v1/query/*", "/v1/verify/*"]
