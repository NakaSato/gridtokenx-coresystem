apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: trading-service-api-allow
  namespace: gridtokenx-prod
spec:
  selector:
    matchLabels:
      app: trading-service
      component: api
  action: ALLOW
  rules:
  - from:
    - source:
        # Permitted ingress from APISIX (edge)
        principals: ["spiffe://gridtokenx.th/prod/apisix"]
    - source:
        # Administrative queries from reporting service
        principals: ["spiffe://gridtokenx.th/prod/reporting-service"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: trading-service-matcher-allow
  namespace: gridtokenx-prod
spec:
  selector:
    matchLabels:
      app: trading-service
      component: matcher
  action: ALLOW
  rules:
  - from:
    - source:
        # Command submission from the trading API surface
        principals: ["spiffe://gridtokenx.th/prod/trading-service/api"]
    - source:
        # Settlement coordination
        principals: ["spiffe://gridtokenx.th/prod/settlement-service"]
