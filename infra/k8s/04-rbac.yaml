apiVersion: v1
kind: ServiceAccount
metadata:
  name: iam-service
  namespace: gridtokenx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trading-service
  namespace: gridtokenx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: oracle-bridge
  namespace: gridtokenx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chain-bridge
  namespace: gridtokenx
---
# Allow services to read their own secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: gridtokenx
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: services-secret-reader
  namespace: gridtokenx
subjects:
  - kind: ServiceAccount
    name: iam-service
    namespace: gridtokenx
  - kind: ServiceAccount
    name: trading-service
    namespace: gridtokenx
  - kind: ServiceAccount
    name: oracle-bridge
    namespace: gridtokenx
  - kind: ServiceAccount
    name: chain-bridge
    namespace: gridtokenx
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
