# ─────────────────────────────────────────────────────────────
# Kafka Schema Registry
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: gridtokenx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
    spec:
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.6.0
          ports:
            - containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: kafka-cmd.gridtokenx-infra.svc.cluster.local:9092
            - name: SCHEMA_REGISTRY_LISTENERS
              value: http://0.0.0.0:8081
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /subjects
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: gridtokenx-infra
spec:
  selector:
    app: schema-registry
  ports:
    - port: 8081
      targetPort: 8081
---
# ─────────────────────────────────────────────────────────────
# Kafka metrics exporter (covers all 3 clusters)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: gridtokenx-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:latest
          args:
            - --kafka.server=kafka-cmd.gridtokenx-infra.svc.cluster.local:9092
            - --kafka.server=kafka-market.gridtokenx-infra.svc.cluster.local:9092
            - --kafka.server=kafka-audit.gridtokenx-infra.svc.cluster.local:9092
          ports:
            - containerPort: 9308
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: gridtokenx-infra
spec:
  selector:
    app: kafka-exporter
  ports:
    - port: 9308
      targetPort: 9308
