# 3 independent Kafka clusters for GridTokenX:
#   kafka-cmd    — Commands, trades, settlements (7-day retention, 3 partitions)
#   kafka-market — Market data, order book, prices (24-hour retention, 10 partitions)
#   kafka-audit  — Regulatory audit trail (7-day retention, 3 partitions)
#
# Image: confluentinc/cp-kafka:7.6.0 (KRaft mode, no ZooKeeper)

# ─────────────────────────────────────────────────────────────
# Kafka CMD cluster (durable commands & settlements)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-cmd
  namespace: gridtokenx-infra
  labels:
    app: kafka-cmd
    cluster: cmd
spec:
  serviceName: kafka-cmd
  replicas: 1
  selector:
    matchLabels:
      app: kafka-cmd
  template:
    metadata:
      labels:
        app: kafka-cmd
        cluster: cmd
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: CLUSTER_ID
              value: "GTX0CMDCluster000001AAAAB"   # Unique base64 cluster ID
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka-cmd-0.kafka-cmd.gridtokenx-infra.svc.cluster.local:9093"
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka-cmd.gridtokenx-infra.svc.cluster.local:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "168"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - kafka-topics --bootstrap-server localhost:9092 --list
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: gridtokenx-fast
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-cmd
  namespace: gridtokenx-infra
spec:
  selector:
    app: kafka-cmd
  clusterIP: None
  ports:
    - port: 9092
      targetPort: 9092
      name: kafka
    - port: 9093
      targetPort: 9093
      name: controller
---
