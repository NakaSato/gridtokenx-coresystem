apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-service
  namespace: gridtokenx
  labels:
    app: trading-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-service
  template:
    metadata:
      labels:
        app: trading-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4020"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: trading-service
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql-primary.gridtokenx-infra.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2
              done
              until nc -z redis-primary.gridtokenx-infra.svc.cluster.local 6379; do
                echo "Waiting for Redis..."; sleep 2
              done
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z kafka-cmd.gridtokenx-infra.svc.cluster.local 9092; do
                echo "Waiting for Kafka CMD..."; sleep 3
              done
              until nc -z kafka-market.gridtokenx-infra.svc.cluster.local 9092; do
                echo "Waiting for Kafka MARKET..."; sleep 3
              done
      containers:
        - name: trading-service
          image: gridtokenx/trading-service:latest   # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 4020
              name: http
            - containerPort: 5020
              name: grpc
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: SERVICE_NAME
              value: trading-service
            - name: HTTP_PORT
              value: "4020"
            - name: GRPC_PORT
              value: "5020"
            - name: OTEL_SERVICE_NAME
              value: gridtokenx-trading-service
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: REDIS_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: JWT_SECRET
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HMAC_SECRET
            - name: ENCRYPTION_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: ENCRYPTION_SECRET
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: RABBITMQ_PASSWORD
            - name: ENGINEERING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: ENGINEERING_API_KEY
            - name: SOLANA_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_RPC_URL
            - name: SOLANA_TRADING_PROGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_TRADING_PROGRAM_ID
            - name: ENERGY_TOKEN_MINT
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: ENERGY_TOKEN_MINT
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 4020
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4020
            initialDelaySeconds: 10
            periodSeconds: 5
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: trading-service
  namespace: gridtokenx
  labels:
    app: trading-service
spec:
  selector:
    app: trading-service
  ports:
    - port: 4020
      targetPort: 4020
      name: http
    - port: 5020
      targetPort: 5020
      name: grpc
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trading-service
  namespace: gridtokenx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trading-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: trading-service
  namespace: gridtokenx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: trading-service
