apiVersion: apps/v1
kind: Deployment
metadata:
  name: chain-bridge
  namespace: gridtokenx
  labels:
    app: chain-bridge
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chain-bridge
  template:
    metadata:
      labels:
        app: chain-bridge
        version: v1
    spec:
      serviceAccountName: chain-bridge
      containers:
        - name: chain-bridge
          image: gridtokenx/chain-bridge:latest   # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 5040
              name: grpc
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: SERVICE_NAME
              value: chain-bridge
            - name: GRPC_PORT
              value: "5040"
            - name: OTEL_SERVICE_NAME
              value: gridtokenx-chain-bridge
            - name: SOLANA_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_RPC_URL
            - name: SOLANA_WS_URL
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_WS_URL
            - name: SOLANA_REGISTRY_PROGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_REGISTRY_PROGRAM_ID
            - name: SOLANA_TRADING_PROGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_TRADING_PROGRAM_ID
            - name: SOLANA_ORACLE_PROGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_ORACLE_PROGRAM_ID
            - name: SOLANA_GOVERNANCE_PROGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_GOVERNANCE_PROGRAM_ID
            - name: SOLANA_ENERGY_TOKEN_PROGRAM_ID
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: SOLANA_ENERGY_TOKEN_PROGRAM_ID
            - name: ENERGY_TOKEN_MINT
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: ENERGY_TOKEN_MINT
            - name: BRIDGE_KEYPAIR_JSON
              valueFrom:
                secretKeyRef:
                  name: solana-secrets
                  key: BRIDGE_KEYPAIR_JSON
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - grpc_health_probe
                - -addr=:5040
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - grpc_health_probe
                - -addr=:5040
            initialDelaySeconds: 10
            periodSeconds: 5
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: chain-bridge
  namespace: gridtokenx
  labels:
    app: chain-bridge
spec:
  selector:
    app: chain-bridge
  ports:
    - port: 5040
      targetPort: 5040
      name: grpc
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chain-bridge
  namespace: gridtokenx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: chain-bridge
