# One-shot Job to run all pending database migrations
# Run this before deploying/upgrading core services.
# kubectl apply -f infra/k8s/services/db-migrations.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrations
  namespace: gridtokenx
  labels:
    app: db-migrations
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgresql-primary.gridtokenx-infra.svc.cluster.local 5432; do
                echo "Waiting for PostgreSQL..."; sleep 2
              done
      containers:
        - name: migrations
          image: gridtokenx/iam-service:latest   # The IAM service binary includes sqlx migrations
          command: ["/app/migrate"]              # Adjust to your migration binary/entrypoint
          env:
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgresql-primary.gridtokenx-infra.svc.cluster.local:5432/gridtokenx"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
