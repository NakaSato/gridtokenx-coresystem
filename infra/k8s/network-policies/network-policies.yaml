# Default deny-all for gridtokenx namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gridtokenx
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Default deny-all for gridtokenx-infra namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: gridtokenx-infra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS egress from all pods in gridtokenx
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: gridtokenx
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow DNS egress from gridtokenx-infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: gridtokenx-infra
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# APISIX: accept public ingress, egress to core services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: apisix-policy
  namespace: gridtokenx
spec:
  podSelector:
    matchLabels:
      app: apisix
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}   # Allow from anywhere (public-facing)
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: iam-service
      ports:
        - port: 4010
    - to:
        - podSelector:
            matchLabels:
              app: trading-service
      ports:
        - port: 4020
    - ports:
        - port: 53
          protocol: UDP
---
# Envoy IoT gateway: accept IoT mTLS, egress to oracle-bridge
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: envoy-gateway-policy
  namespace: gridtokenx
spec:
  podSelector:
    matchLabels:
      app: envoy-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}   # Allow from IoT devices (public-facing)
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: oracle-bridge
      ports:
        - port: 4030
    - ports:
        - port: 53
          protocol: UDP
---
# IAM service: accept from APISIX, egress to infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: iam-service-policy
  namespace: gridtokenx
spec:
  podSelector:
    matchLabels:
      app: iam-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: apisix
      ports:
        - port: 4010
    - from:
        - podSelector:
            matchLabels:
              app: trading-service
      ports:
        - port: 5010
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx-infra
      ports:
        - port: 5432   # PostgreSQL
        - port: 6379   # Redis
        - port: 5672   # RabbitMQ
    - to:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx-observability
      ports:
        - port: 4317   # OTEL
    - ports:
        - port: 53
          protocol: UDP
---
# Trading service: accept from APISIX and internal, egress to infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trading-service-policy
  namespace: gridtokenx
spec:
  podSelector:
    matchLabels:
      app: trading-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: apisix
      ports:
        - port: 4020
    - from:
        - podSelector:
            matchLabels:
              app: oracle-bridge
      ports:
        - port: 5020   # gRPC settlement coordination
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: iam-service
      ports:
        - port: 5010
    - to:
        - podSelector:
            matchLabels:
              app: chain-bridge
      ports:
        - port: 5040
    - to:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx-infra
      ports:
        - port: 5432   # PostgreSQL
        - port: 6379   # Redis
        - port: 9092   # Kafka
        - port: 5672   # RabbitMQ
    - to:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx-observability
      ports:
        - port: 4317
    - ports:
        - port: 53
          protocol: UDP
---
# Oracle bridge: accept from Envoy, egress to infra
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: oracle-bridge-policy
  namespace: gridtokenx
spec:
  podSelector:
    matchLabels:
      app: oracle-bridge
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: envoy-gateway
      ports:
        - port: 4030
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: trading-service
      ports:
        - port: 5020
    - to:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx-infra
      ports:
        - port: 5432
        - port: 8086   # InfluxDB
        - port: 9092   # Kafka
    - to:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx-observability
      ports:
        - port: 4317
    - ports:
        - port: 53
          protocol: UDP
---
# Chain bridge: accept from trading-service only (gRPC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chain-bridge-policy
  namespace: gridtokenx
spec:
  podSelector:
    matchLabels:
      app: chain-bridge
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: trading-service
      ports:
        - port: 5040
  egress:
    - {}   # Allow egress to Solana RPC (external)
---
# PostgreSQL: accept from service namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgresql-policy
  namespace: gridtokenx-infra
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx
      ports:
        - port: 5432
    - from:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
---
# Redis: accept from service namespace only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: gridtokenx-infra
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx
      ports:
        - port: 6379
    - from:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
---
# Kafka: accept from service namespace and schema registry
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-policy
  namespace: gridtokenx-infra
spec:
  podSelector:
    matchLabels:
      cluster: cmd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: gridtokenx
      ports:
        - port: 9092
