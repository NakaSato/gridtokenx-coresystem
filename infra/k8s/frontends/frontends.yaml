# ─────────────────────────────────────────────────────────────
# Admin Portal  (Next.js, port 11003)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal
  namespace: gridtokenx
  labels:
    app: admin-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-portal
  template:
    metadata:
      labels:
        app: admin-portal
    spec:
      containers:
        - name: admin-portal
          image: gridtokenx/admin-portal:latest   # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.gridtokenx.com"
            - name: NEXT_PUBLIC_ENGINEERING_API_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: ENGINEERING_API_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: admin-portal
  namespace: gridtokenx
spec:
  selector:
    app: admin-portal
  ports:
    - port: 11003
      targetPort: 3000
      name: http
---
# ─────────────────────────────────────────────────────────────
# Smart Meter Simulator  (Python FastAPI, port 12010)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-meter-simulator
  namespace: gridtokenx
  labels:
    app: smart-meter-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smart-meter-simulator
  template:
    metadata:
      labels:
        app: smart-meter-simulator
    spec:
      containers:
        - name: simulator
          image: gridtokenx/smart-meter-simulator:latest   # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ORACLE_BRIDGE_URL
              value: "http://envoy-gateway.gridtokenx.svc.cluster.local:8080"
            - name: INFLUXDB_URL
              value: "http://influxdb.gridtokenx-infra.svc.cluster.local:8086"
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: INFLUXDB_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: smart-meter-simulator
  namespace: gridtokenx
spec:
  selector:
    app: smart-meter-simulator
  ports:
    - port: 12010
      targetPort: 8000
      name: http
