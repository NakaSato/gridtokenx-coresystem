# ─────────────────────────────────────────────────────────────
# Trading UI  (Next.js, port 11001)
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-ui
  namespace: gridtokenx
  labels:
    app: trading-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-ui
  template:
    metadata:
      labels:
        app: trading-ui
    spec:
      containers:
        - name: trading-ui
          image: gridtokenx/trading-ui:latest   # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.gridtokenx.com"
            - name: NEXT_PUBLIC_WS_URL
              value: "wss://api.gridtokenx.com"
            - name: NEXT_PUBLIC_SOLANA_CLUSTER
              value: "devnet"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trading-ui
  namespace: gridtokenx
spec:
  selector:
    app: trading-ui
  ports:
    - port: 11001
      targetPort: 3000
      name: http
---
