apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: gridtokenx
data:
  # Service ports
  IAM_HTTP_PORT: "4010"
  IAM_GRPC_PORT: "5010"
  TRADING_HTTP_PORT: "4020"
  TRADING_GRPC_PORT: "5020"
  ORACLE_HTTP_PORT: "4030"
  ORACLE_GRPC_PORT: "5030"
  CHAIN_BRIDGE_GRPC_PORT: "5040"

  # Internal gRPC endpoints (within cluster)
  IAM_GRPC_ENDPOINT: "iam-service.gridtokenx.svc.cluster.local:5010"
  TRADING_GRPC_ENDPOINT: "trading-service.gridtokenx.svc.cluster.local:5020"
  ORACLE_GRPC_ENDPOINT: "oracle-bridge.gridtokenx.svc.cluster.local:5030"
  CHAIN_BRIDGE_GRPC_ENDPOINT: "chain-bridge.gridtokenx.svc.cluster.local:5040"

  # Database endpoints
  DATABASE_URL: "postgresql://gridtokenx_user:$(POSTGRES_PASSWORD)@postgresql-primary.gridtokenx-infra.svc.cluster.local:5432/gridtokenx"
  DATABASE_REPLICA_URL: "postgresql://gridtokenx_user:$(POSTGRES_PASSWORD)@postgresql-replica.gridtokenx-infra.svc.cluster.local:5432/gridtokenx"
  REDIS_URL: "redis://redis-primary.gridtokenx-infra.svc.cluster.local:6379"
  REDIS_REPLICA_URL: "redis://redis-replica.gridtokenx-infra.svc.cluster.local:6379"
  INFLUXDB_URL: "http://influxdb.gridtokenx-infra.svc.cluster.local:8086"
  CLICKHOUSE_URL: "http://clickhouse.gridtokenx-infra.svc.cluster.local:8123"

  # Messaging endpoints
  KAFKA_CMD_BROKERS: "kafka-cmd.gridtokenx-infra.svc.cluster.local:9092"
  KAFKA_MARKET_BROKERS: "kafka-market.gridtokenx-infra.svc.cluster.local:9092"
  KAFKA_AUDIT_BROKERS: "kafka-audit.gridtokenx-infra.svc.cluster.local:9092"
  KAFKA_SCHEMA_REGISTRY_URL: "http://schema-registry.gridtokenx-infra.svc.cluster.local:8081"
  RABBITMQ_URL: "amqp://gridtokenx:$(RABBITMQ_PASSWORD)@rabbitmq.gridtokenx-infra.svc.cluster.local:5672"

  RUST_LOG: "info"

  # Feature flags
  ENABLE_WEBSOCKET: "true"
  ENABLE_BLOCKCHAIN_INTEGRATION: "true"
  ENABLE_PUSH_NOTIFICATIONS: "false"
  ENABLE_SMS_NOTIFICATIONS: "false"
  ENABLE_MARKET_DYNAMICS: "true"
  ENABLE_SETTLEMENT_PROCESSOR: "true"
  ENABLE_METRICS: "true"
  TOKENIZATION_ENABLE_REAL_BLOCKCHAIN: "true"

  # JWT settings
  JWT_EXPIRATION: "86400"
  REFRESH_TOKEN_EXPIRATION: "604800"

  # Email
  SMTP_HOST: "mailpit.gridtokenx-infra.svc.cluster.local"
  SMTP_PORT: "1025"
  EMAIL_FROM_ADDRESS: "noreply@gridtokenx.com"
  ENABLE_EMAIL_VERIFICATION: "true"

  # Vault
  VAULT_ADDR: "http://vault.gridtokenx-infra.svc.cluster.local:8200"

  # Solana (override per environment)
  SOLANA_CLUSTER: "devnet"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gridtokenx-observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: gridtokenx-prod

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: iam-service
        static_configs:
          - targets: ['iam-service.gridtokenx.svc.cluster.local:4010']
        metrics_path: /metrics

      - job_name: trading-service
        static_configs:
          - targets: ['trading-service.gridtokenx.svc.cluster.local:4020']
        metrics_path: /metrics

      - job_name: oracle-bridge
        static_configs:
          - targets: ['oracle-bridge.gridtokenx.svc.cluster.local:4030']
        metrics_path: /metrics

      - job_name: postgresql
        static_configs:
          - targets: ['postgresql-exporter.gridtokenx-infra.svc.cluster.local:9187']

      - job_name: redis
        static_configs:
          - targets: ['redis-exporter.gridtokenx-infra.svc.cluster.local:9121']

      - job_name: kafka
        static_configs:
          - targets: ['kafka-exporter.gridtokenx-infra.svc.cluster.local:9308']

      - job_name: node
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

