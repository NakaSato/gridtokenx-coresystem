# IMPORTANT: Replace all placeholder values before deploying.
# For production, manage secrets via HashiCorp Vault or Kubernetes External Secrets Operator.
# Values here are base64-encoded placeholders — replace with:
#   echo -n 'your-actual-value' | base64

apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: gridtokenx
type: Opaque
stringData:
  # JWT & Auth — MUST be at least 32 chars
  JWT_SECRET: "CHANGE_ME_jwt_secret_min_32_chars_here"
  API_KEY_SECRET: "CHANGE_ME_api_key_secret_min_32_chars"
  HMAC_SECRET: "CHANGE_ME_hmac_secret_min_32_chars_xx"
  ENCRYPTION_SECRET: "CHANGE_ME_encryption_key_32_chars_xx"

  # Database credentials
  POSTGRES_PASSWORD: "CHANGE_ME_postgres_password"
  POSTGRES_USER: "gridtokenx_user"
  POSTGRES_DB: "gridtokenx"

  # Redis
  REDIS_PASSWORD: "CHANGE_ME_redis_password"

  # Messaging
  RABBITMQ_USER: "gridtokenx"
  RABBITMQ_PASSWORD: "CHANGE_ME_rabbitmq_password"

  # InfluxDB
  INFLUXDB_TOKEN: "CHANGE_ME_influxdb_token"
  INFLUXDB_ORG: "gridtokenx"
  INFLUXDB_BUCKET: "gridtokenx"
  INFLUXDB_ADMIN_USER: "admin"
  INFLUXDB_ADMIN_PASSWORD: "CHANGE_ME_influxdb_password"

  # ClickHouse
  CLICKHOUSE_USER: "gridtokenx"
  CLICKHOUSE_PASSWORD: "CHANGE_ME_clickhouse_password"

  # Vault
  VAULT_TOKEN: "CHANGE_ME_vault_root_token"

  # Engineering API key
  ENGINEERING_API_KEY: "CHANGE_ME_engineering_api_key_2025"
---
