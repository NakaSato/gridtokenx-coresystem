groups:
  - name: gridtokenx.aggregator_bridge.alerts
    rules:
    - alert: AggregatorRelayQueueSaturation
      expr: aggregator_queue_depth > 8000
      for: 5m
      labels:
        severity: critical
        team: grid-ops
      annotations:
        summary: "Aggregator Bridge relay queue is near saturation!"
        description: "Queue depth is {{ $value }} (limit 10000) for more than 5 minutes. Downstream blockchain submission is likely bottlenecked."

    - alert: AggregatorHighSubmissionLatency
      expr: histogram_quantile(0.95, sum(rate(aggregator_blockchain_submission_duration_ms_bucket[5m])) by (le)) > 30000
      for: 10m
      labels:
        severity: warning
        team: grid-ops
      annotations:
        summary: "High blockchain submission latency detected"
        description: "The 95th percentile for Solana settlements is {{ $value }}ms. This exceeds the 30s threshold."

    - alert: AggregatorSubmissionFailureSpike
      expr: sum(rate(aggregator_blockchain_submissions_total{success="false"}[5m])) / sum(rate(aggregator_blockchain_submissions_total[5m])) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High aggregator submission failure rate!"
        description: "More than 5% of attestation batches are failing to settle on-chain in the last 2 minutes."

    - alert: AggregatorNoIngestionActivity
      expr: rate(aggregator_ingestion_requests_total[5m]) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Zero ingestion activity from Aggregator Bridge"
        description: "No new attestation batches have been received in the last 5 minutes. Check Aggregator Bridge health."

    - alert: AggregatorSurplusMintDisabled
      expr: aggregator_settlement_path{path="disabled"} == 1
      for: 5m
      labels:
        severity: warning
        team: grid-ops
      annotations:
        summary: "Aggregator surplus mint path is DISABLED"
        description: "aggregator_settlement_path reports the mint path as disabled (MINT_VIA_CHAIN_BRIDGE unset or NATS unreachable). Completed billing bins evict without minting surplus to meter owners."

    - alert: AggregatorMintSkipSpike
      expr: sum(rate(aggregator_mint_total{outcome="skipped"}[15m])) / clamp_min(sum(rate(aggregator_mint_total[15m])), 0.001) > 0.10
      for: 15m
      labels:
        severity: warning
        team: grid-ops
      annotations:
        summary: "Surplus mints are being skipped at a high rate"
        description: "More than 10% of completed surplus bins are skipped (no recipient wallet / owner-resolve error) over 15m. Likely unregistered meters generating surplus — check meter-service registration and the meters/users join."

    - alert: AggregatorMintLost
      expr: increase(aggregator_mint_total{outcome="lost"}[5m]) > 0
      for: 0m
      labels:
        severity: critical
        team: grid-ops
      annotations:
        summary: "Aggregator surplus mint LOST — manual recovery needed"
        description: "{{ $value }} surplus mint(s) could not be durably handed off in the last 5m: the durable outbox enqueue failed twice and the last-resort immediate mint also failed (outcome=lost, reason=outbox_and_mint_failed). The bin's durable Redis entry was retained (not evicted) — check Chain Bridge / Redis health and recover from gridtokenx:billing:bins."
