groups:
  - name: gridtokenx.aggregator_bridge.alerts
    rules:
    - alert: AggregatorRelayQueueSaturation
      expr: aggregator_queue_depth > 8000
      for: 5m
      labels:
        severity: critical
        team: grid-ops
      annotations:
        summary: "Aggregator Bridge relay queue is near saturation!"
        description: "Queue depth is {{ $value }} (limit 10000) for more than 5 minutes. Downstream blockchain submission is likely bottlenecked."

    - alert: AggregatorHighSubmissionLatency
      expr: histogram_quantile(0.95, sum(rate(aggregator_blockchain_submission_duration_ms_bucket[5m])) by (le)) > 30000
      for: 10m
      labels:
        severity: warning
        team: grid-ops
      annotations:
        summary: "High blockchain submission latency detected"
        description: "The 95th percentile for Solana settlements is {{ $value }}ms. This exceeds the 30s threshold."

    - alert: AggregatorSubmissionFailureSpike
      expr: sum(rate(aggregator_blockchain_submissions_total{success="false"}[5m])) / sum(rate(aggregator_blockchain_submissions_total[5m])) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "High aggregator submission failure rate!"
        description: "More than 5% of attestation batches are failing to settle on-chain in the last 2 minutes."

    - alert: AggregatorNoIngestionActivity
      expr: rate(aggregator_ingestion_requests_total[5m]) == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Zero ingestion activity from Aggregator Bridge"
        description: "No new attestation batches have been received in the last 5 minutes. Check Aggregator Bridge health."
