name: iam-service-tests

# Unit-test gate for the gridtokenx-iam-service.
#
# Superproject-hosted (sibling path deps — gridtokenx-telemetry, blockchain-core
# — resolve only here). Two iam-specific quirks vs the other gate workflows:
#
#  1. `--features mocks` — iam-core's trait tests use mockall behind the optional
#     `mocks` feature; without it that crate's lib tests don't compile.
#  2. Postgres service — iam-persistence's repository tests use `#[sqlx::test]`,
#     which requires DATABASE_URL and creates a per-test database (it applies the
#     crate's migrations/ automatically). They are NOT #[ignore]-gated, so a
#     plain infra-less `cargo test` fails with "DATABASE_URL must be set". The
#     service below gives them a real Postgres so the full lib suite runs green.
#
# Still LIBRARY tests only (`--lib`); any heavier integration suites stay in e2e.

on:
  push:
    branches: [main]
    paths:
      - 'gridtokenx-iam-service'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/iam-service-tests.yml'
  pull_request:
    paths:
      - 'gridtokenx-iam-service'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/iam-service-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: iam-service-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test --lib (iam-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gridtokenx-iam-service
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # #[sqlx::test] connects here and creates an isolated database per test,
      # applying crates/iam-persistence/migrations automatically.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-iam-service

      - name: Build
        run: cargo build --workspace --lib --features mocks

      - name: Test (unit lib; iam-core needs the mocks feature)
        run: cargo test --workspace --lib --features mocks

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --features mocks -- -D warnings

      - name: rustfmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check
