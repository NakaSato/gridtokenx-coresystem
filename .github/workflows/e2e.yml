name: e2e

# Two-tier E2E CI:
#   lint  — cheap, every PR. Validates suite integrity (bash -n, py_compile,
#           pytest --collect-only, shellcheck). No services required.
#   full  — heavy, manual / nightly. Brings up the whole stack on a local
#           solana-test-validator and runs `just e2e`. Uploads artifacts.
#
# See tests/e2e/ and docs/E2E_IMPL_PLAN.md.

on:
  pull_request:
    paths:
      - 'tests/e2e/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:
    inputs:
      run_anchor:
        description: 'Run the Anchor on-chain suite (slow)'
        type: boolean
        default: false
  schedule:
    # Nightly full run at 02:00 UTC.
    - cron: '0 2 * * *'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------- #
  # Tier 1 — always-on integrity gate. No stack, no secrets, fast.        #
  # --------------------------------------------------------------------- #
  lint:
    name: suite-integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Suites only reference submodule paths at runtime; lint needs none.

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python deps
        run: pip install -r tests/e2e/requirements.txt

      - name: Bash syntax (bash -n)
        run: |
          rc=0
          while IFS= read -r f; do
            if bash -n "$f"; then echo "ok   $f"; else echo "FAIL $f"; rc=1; fi
          done < <(find tests/e2e -name '*.sh')
          exit $rc

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: tests/e2e
          severity: warning
        continue-on-error: true  # advisory; bash -n is the hard gate

      - name: Python compile
        run: |
          python -m py_compile tests/e2e/conftest.py \
            tests/e2e/lib/*.py tests/e2e/*/test_*.py

      - name: Pytest collect-only (no exec)
        working-directory: tests/e2e
        run: python -m pytest --collect-only -q

  # --------------------------------------------------------------------- #
  # Tier 2 — full live run. Manual dispatch or nightly schedule only.     #
  # --------------------------------------------------------------------- #
  full:
    name: live-suite
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Raise file descriptor limit
        # Local solana-test-validator panics "Too many open files" under load.
        run: ulimit -n 65536 || true

      - name: Install just + nushell
        run: |
          cargo install just nu --locked

      - name: Install python deps
        run: pip install -r tests/e2e/requirements.txt

      - name: Bring up stack
        run: |
          ./scripts/app.sh start
          ./scripts/app.sh init

      - name: Verify dependency connections (preflight)
        env:
          CHAIN_BRIDGE_INSECURE: 'true'
        # Advisory: surfaces the connection table before the heavy suite.
        # Non-blocking because trading's .env may be absent in CI (the binary
        # exits 2 on config load); promote to a hard gate once env is guaranteed.
        continue-on-error: true
        run: just verify-conns

      - name: Run E2E suite
        env:
          CHAIN_BRIDGE_INSECURE: 'true'
          E2E_RUN_ANCHOR: ${{ github.event.inputs.run_anchor == 'true' && '1' || '0' }}
        run: just e2e

      - name: Tear down
        if: always()
        run: ./scripts/app.sh stop || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-${{ github.run_id }}
          path: tests/e2e/artifacts/
          retention-days: 14
          if-no-files-found: ignore

  # --------------------------------------------------------------------- #
  # OpenADR dispatch loop — manual dispatch or nightly, much lighter than #
  # the full stack: redis + kafka + the openleadr-rs VTN + a debug bridge.#
  # Asserts telemetry -> frequency window -> Kafka -> dispatch -> VTN     #
  # event -> VEN execution -> execution report.                           #
  # --------------------------------------------------------------------- #
  openadr:
    name: openadr-dispatch-loop
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-aggregator-bridge

      - name: Run OpenADR e2e
        run: bash scripts/openleadr-e2e.sh

      - name: Container logs on failure
        if: failure()
        run: |
          docker ps -a || true
          docker logs gridtokenx-openleadr-vtn 2>&1 | tail -50 || true
          docker logs gridtokenx-openleadr-vtn-seed 2>&1 | tail -20 || true
