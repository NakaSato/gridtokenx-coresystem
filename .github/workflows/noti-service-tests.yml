name: noti-service-tests

# Unit-test gate for the gridtokenx-noti-service.
#
# Superproject-hosted (sibling path deps resolve only here). Runs LIBRARY unit
# tests only (`cargo test --workspace --lib`) — ~63 across noti-* crates. The
# many tests/ integration suites (grpc_wire, websocket_flow, retry_loop,
# kafka_reconnect, rabbitmq, smtp_live, …) need live infra and run via e2e /
# manual, not here.

on:
  push:
    branches: [main]
    paths:
      - 'gridtokenx-noti-service'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/noti-service-tests.yml'
  pull_request:
    paths:
      - 'gridtokenx-noti-service'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/noti-service-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: noti-service-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test --lib (noti-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gridtokenx-noti-service
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-noti-service

      - name: Build
        run: cargo build --workspace --lib

      - name: Test (unit; tests/ integration suite excluded)
        run: cargo test --workspace --lib

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: rustfmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check
