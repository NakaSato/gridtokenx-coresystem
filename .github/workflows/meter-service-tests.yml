name: meter-service-tests

# Unit-test gate for the gridtokenx-meter-service.
#
# Superproject-hosted (sibling path deps resolve only here). Runs LIBRARY unit
# tests only (`cargo test --workspace --lib`). The bin/meter-service e2e_http
# suite is #[ignore] (needs live Postgres) and is not run here — invoke it via
# `cargo test -p gridtokenx-meter-service --test e2e_http -- --ignored` with a DB.

on:
  push:
    branches: [main]
    paths:
      - 'gridtokenx-meter-service'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/meter-service-tests.yml'
  pull_request:
    paths:
      - 'gridtokenx-meter-service'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/meter-service-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: meter-service-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test --lib (meter-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gridtokenx-meter-service
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-meter-service

      - name: Build
        run: cargo build --workspace --lib

      - name: Test (unit; #[ignore] e2e_http excluded)
        run: cargo test --workspace --lib

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: rustfmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check
