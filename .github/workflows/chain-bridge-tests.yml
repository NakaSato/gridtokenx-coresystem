name: chain-bridge-tests

# Unit-test gate for the gridtokenx-chain-bridge service.
#
# Lives in the superproject (not the service's own repo) because chain-bridge's
# crate graph has path deps on sibling submodules: aggregator-api/build.rs and
# the chain-bridge protocol compile ../../../gridtokenx-blockchain-core's proto,
# and crates reference ../../../gridtokenx-telemetry. Those only resolve here
# with all siblings checked out.
#
# Runs LIBRARY unit tests only (`cargo test --workspace --lib`). The service's
# root is a virtual manifest; --lib skips the tests/ integration suite, which
# needs live infra (Vault/NATS/Solana RPC). Run that via e2e / manual.
#
# Triggers on the bridge submodule pointer or this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'gridtokenx-chain-bridge'
      - 'gridtokenx-blockchain-core'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/chain-bridge-tests.yml'
  pull_request:
    paths:
      - 'gridtokenx-chain-bridge'
      - 'gridtokenx-blockchain-core'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/chain-bridge-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chain-bridge-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test --lib (chain-bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gridtokenx-chain-bridge
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-chain-bridge

      - name: Build (regenerates proto bindings)
        run: cargo build --workspace --lib

      - name: Test (unit; tests/ integration suite excluded)
        run: cargo test --workspace --lib

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: rustfmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check
