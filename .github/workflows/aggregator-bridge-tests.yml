name: aggregator-bridge-tests

# Unit-test gate for the gridtokenx-aggregator-bridge service.
#
# aggregator-bridge is a git submodule of this superproject. Like
# gridtokenx-blockchain-core, it CANNOT run its tests in a standalone checkout:
# `aggregator-api` has a path dependency on `../../../gridtokenx-telemetry` (a
# plain dir committed in THIS superproject, not a submodule), so the crate graph
# only resolves here, with siblings present. That is why this gate lives in the
# superproject and not in the service's own repo CI.
#
# This runs the inline unit tests (`cargo test --workspace`). The service's root
# is itself a package, so a bare `cargo test` would run the binary crate only —
# `--workspace` is required to reach the member crates. The `#[ignore]`-gated
# integration tests (Redis/Vault/Postgres/RabbitMQ/Kafka/gRPC) are NOT run here;
# they need live infra and are covered by the e2e workflow / manual
# `cargo test -- --ignored` runs.
#
# Triggers on any change to the bridge submodule pointer (how a bridge change
# lands in the platform) or to this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'gridtokenx-aggregator-bridge'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/aggregator-bridge-tests.yml'
  pull_request:
    paths:
      - 'gridtokenx-aggregator-bridge'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/aggregator-bridge-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aggregator-bridge-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test (aggregator-bridge)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gridtokenx-aggregator-bridge
    steps:
      - uses: actions/checkout@v4
        with:
          # bridge (submodule) + telemetry (plain dir) must both be present for
          # the path-dep crate graph to resolve.
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        # aggregator-protocol/build.rs regenerates the ConnectRPC/prost types
        # from proto/{oracle,dispatch}.proto and needs protoc in PATH.
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-aggregator-bridge

      - name: Build (regenerates prost/ConnectRPC types from proto)
        run: cargo build --workspace --all-targets

      - name: Test (unit; #[ignore] integration tests excluded)
        run: cargo test --workspace

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: rustfmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check
