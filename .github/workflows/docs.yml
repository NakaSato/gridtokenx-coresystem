name: docs

# Two-tier doc-lint, mirroring e2e.yml:
#   doc-lint        — cheap, every PR. Superproject docs only; no submodules,
#                     no services, no network. Self-tests the linter first.
#   submodule-docs  — heavy, main-push / nightly / manual. Checks out every
#                     submodule and validates its docs (incl. code-anchored
#                     path:line claims) against its own tree.
#
# Keeps the docs harness honest so broken links and stale `path:line` citations
# fail instead of rotting (this is what let the 127.0.0.1 claim and deleted-file
# links survive before). See scripts/lint-docs.py + scripts/lint-docs-all.sh.

on:
  pull_request:
    paths:
      - '**.md'
      - 'scripts/lint-docs.py'
      - 'scripts/test_lint_docs.py'
      - 'scripts/lint-docs-all.sh'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
  schedule:
    # Nightly: catches submodule-pointer bumps that brought in broken docs.
    - cron: '30 2 * * *'
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-docs:
    name: doc-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # No submodules: the linter does not read submodule-internal files.

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Self-test the linter (stdlib unittest, no pip)
        run: python3 scripts/test_lint_docs.py

      - name: Lint docs (links + path:line)
        run: python3 scripts/lint-docs.py

  # --------------------------------------------------------------------- #
  # Tier 2 — superproject + every submodule. Validates code-anchored       #
  # path:line claims against the tree where the file lives. Heavy: needs   #
  # submodule checkout. main-push / nightly / manual only.                 #
  # --------------------------------------------------------------------- #
  submodule-docs:
    name: doc-lint (all submodules)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint superproject + all submodules
        run: bash scripts/lint-docs-all.sh
