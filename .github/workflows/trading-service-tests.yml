name: trading-service-tests

# Unit-test gate for the gridtokenx-trading-service.
#
# Superproject-hosted: trading crates have path deps on ../../../gridtokenx-telemetry
# (plain dir) and ../../../gridtokenx-blockchain-core (sibling submodule), which
# only resolve with siblings checked out.
#
# Runs LIBRARY unit tests only (`cargo test --workspace --lib`) — ~114 across the
# trading-* crates. The tests/ integration suites (matching/settlement/Kafka)
# need live infra and run via e2e / manual, not here.

on:
  push:
    branches: [main]
    paths:
      - 'gridtokenx-trading-service'
      - 'gridtokenx-blockchain-core'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/trading-service-tests.yml'
  pull_request:
    paths:
      - 'gridtokenx-trading-service'
      - 'gridtokenx-blockchain-core'
      - 'gridtokenx-telemetry/**'
      - '.github/workflows/trading-service-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trading-service-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: cargo test --lib (trading-service)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: gridtokenx-trading-service
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gridtokenx-trading-service

      - name: Build
        run: cargo build --workspace --lib

      - name: Test (unit; tests/ integration suite excluded)
        run: cargo test --workspace --lib

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: rustfmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --check
