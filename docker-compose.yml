services:
  # PostgreSQL Database for API (Primary)
  postgres:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_duration=on"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      # Replication settings
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "synchronous_commit=off"
    ports:
      - "${POSTGRES_PRIMARY_PORT:-7001}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh:ro
      - ./scripts/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    networks:
      - gridtokenx-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database for API (Replica)
  postgres-replica:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres-replica
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRIMARY_HOST: postgres
      TZ: ${TZ}
    entrypoint: ["/bin/sh", "/scripts/init-replica.sh"]
    ports:
      - "${POSTGRES_REPLICA_PORT:-7002}:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/init-replica.sh:/scripts/init-replica.sh:ro
    networks:
      - gridtokenx-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache for API (Primary)
  redis:
    image: redis:7-alpine
    container_name: gridtokenx-redis
    environment:
      TZ: ${TZ}
    ports:
      - "${REDIS_PRIMARY_PORT:-7010}:6379"
    volumes:
      - redis_data:/data
    networks:
      - gridtokenx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis Cache for API (Replica)
  redis-replica:
    image: redis:7-alpine
    container_name: gridtokenx-redis-replica
    command: redis-server --replicaof redis 6379
    environment:
      TZ: ${TZ}
    ports:
      - "${REDIS_REPLICA_PORT:-7011}:6379"
    volumes:
      - redis_replica_data:/data
    networks:
      - gridtokenx-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO - Local S3 Simulation for Long-Term Retention
  minio:
    image: minio/minio:latest
    container_name: gridtokenx-minio
    ports:
      - "9005:9000" # API
      - "9006:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secret_2025
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # InfluxDB Time Series Database
  influxdb:
    image: influxdb:2.7-alpine
    container_name: gridtokenx-influxdb
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: "curl -f http://localhost:8086/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka cluster 1: Commands & Events (Low-volume, strict order, durable)
  kafka-cmd:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka-cmd
    ports:
      - "${KAFKA_CMD_PORT:-9001}:9001"
      - "29001:29001"
    environment:
      TZ: ${TZ}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-cmd:9004
      KAFKA_LISTENERS: PLAINTEXT://:9001,PLAINTEXT_HOST://:29001,CONTROLLER://:9004
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-cmd:9001,PLAINTEXT_HOST://localhost:29001
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_cmd_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9001 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka cluster 2: Market Data & Telemetry (High-TPS, ephemeral)
  kafka-market:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka-market
    ports:
      - "${KAFKA_MARKET_PORT:-9002}:9002"
      - "29002:29002"
    environment:
      TZ: ${TZ}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-market:9005
      KAFKA_LISTENERS: PLAINTEXT://:9002,PLAINTEXT_HOST://:29002,CONTROLLER://:9005
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-market:9002,PLAINTEXT_HOST://localhost:29002
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 10
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_market_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9002 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka cluster 3: Audit (Regulatory events, long retention)
  kafka-audit:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka-audit
    ports:
      - "${KAFKA_AUDIT_PORT:-9003}:9003"
      - "29003:29003"
    environment:
      TZ: ${TZ}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-audit:9006
      KAFKA_LISTENERS: PLAINTEXT://:9003,PLAINTEXT_HOST://:29003,CONTROLLER://:9006
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-audit:9003,PLAINTEXT_HOST://localhost:29003
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_audit_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9003 --list || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ClickHouse (CQRS Read Side for High Volume Analytics)
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: gridtokenx-clickhouse
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-gridtokenx}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse_secret_2025}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-gridtokenx}
      CLICKHOUSE_LISTEN_HOST: 0.0.0.0
    ports:
      - "${CLICKHOUSE_PORT:-7030}:8123"
      - "7031:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/listen_host.xml:/etc/clickhouse-server/config.d/listen_host.xml
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8123/ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ Message Broker (Task Queues & RPC)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gridtokenx-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-9030}:5672" # AMQP Protocol
      - "${RABBITMQ_MGMT_PORT:-9031}:15672" # Management UI
    environment:
      TZ: ${TZ}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-gridtokenx}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}
      RABBITMQ_DEFAULT_VHOST: /
      # Performance tuning
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK_RELATIVE: "0.6"
      RABBITMQ_DISK_FREE_LIMIT: "50MB"
      # Enable plugins
      RABBITMQ_PLUGINS: "rabbitmq_management rabbitmq_prometheus"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    #      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Apache APISIX - User Gateway (Public Internet / Web Clients)
  apisix:
    image: apache/apisix:3.9.0-debian
    container_name: gridtokenx-apisix
    environment:
      APISIX_STAND_ALONE: "true"
    ports:
      - "4001:9080" # User Proxy HTTP
      - "8443:9443" # User Proxy HTTPS
      - "8001:9180" # Admin HTTP
    volumes:
      - ./apisix_conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    networks:
      - gridtokenx-network
      - user-tier
    depends_on:
      - postgres
      - redis
    restart: always

  # Envoy - Edge Gateway (IoT Devices / mTLS)
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: gridtokenx-envoy
    ports:
      - "4002:10000" # Edge Proxy
      - "8002:9901" # Envoy Admin
    volumes:
      - ./envoy_conf/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - edge-tier
      - gridtokenx-network
    restart: always

  iam-service:
    build:
      context: ./
      dockerfile: gridtokenx-iam-service/Dockerfile
    container_name: gridtokenx-iam-service
    ports:
      - "${IAM_HTTP_PORT:-4010}:8080"
      - "${IAM_GRPC_PORT:-5010}:8090"
    environment:
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@postgres:5432/gridtokenx
      REDIS_URL: redis://redis:6379
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-gridtokenx}:${CLICKHOUSE_PASSWORD:-clickhouse_secret_2025}@clickhouse:8123/${CLICKHOUSE_DB:-gridtokenx}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      IAM_PORT: 8080
      IAM_GRPC_PORT: 8090
      PORT: 8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://gridtokenx-otel-gateway:4317
      OTEL_SERVICE_NAME: gridtokenx-iam-service
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      RUST_LOG: debug,librdkafka=warn
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      CHAIN_BRIDGE_URL: ${CHAIN_BRIDGE_URL:-http://host.orbstack.local:5040}
      CHAIN_BRIDGE_INSECURE: "true"
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-localnet}
      AUTHORITY_WALLET_PATH: /app/dev-wallet.json
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_MODE: none
      SMTP_FROM: noreply@gridtokenx.com
      ENABLE_EMAIL_VERIFICATION: "true"
      EMAIL_VERIFICATION_REQUIRED: "true"
      EMAIL_VERIFICATION_BASE_URL: http://localhost:4000
    volumes:
      - ./infra/solana/dev-wallet.json:/app/dev-wallet.json
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Trading Service
  trading-service:
    build:
      context: ./
      dockerfile: gridtokenx-trading-service/Dockerfile
    container_name: gridtokenx-trading-service
    ports:
      - "${TRADING_GRPC_PORT:-5020}:8092"
      - "${TRADING_HTTP_PORT:-4020}:8093"
    volumes:
      - ./infra/solana/dev-wallet.json:/app/dev-wallet.json
    environment:
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@postgres:5432/gridtokenx
      REDIS_URL: redis://redis:6379
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      KAFKA_BROKERS: kafka-cmd:9001
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-gridtokenx}:${CLICKHOUSE_PASSWORD:-clickhouse_secret_2025}@clickhouse:8123/${CLICKHOUSE_DB:-gridtokenx}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      RUST_LOG: debug,librdkafka=warn
      OTEL_EXPORTER_OTLP_ENDPOINT: http://gridtokenx-otel-gateway:4317
      OTEL_SERVICE_NAME: gridtokenx-trading-service
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-http://host.orbstack.local:8001}
      CHAIN_BRIDGE_URL: ${CHAIN_BRIDGE_URL:-http://host.orbstack.local:5040}
      CHAIN_BRIDGE_INSECURE: "true"
      SOLANA_WS_URL: ${SOLANA_WS_URL:-ws://host.orbstack.local:8002}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-localnet}
      SOLANA_REGISTRY_PROGRAM_ID: ${SOLANA_REGISTRY_PROGRAM_ID}
      SOLANA_TRADING_PROGRAM_ID: ${SOLANA_TRADING_PROGRAM_ID}
      SOLANA_ORACLE_PROGRAM_ID: ${SOLANA_ORACLE_PROGRAM_ID}
      SOLANA_GOVERNANCE_PROGRAM_ID: ${SOLANA_GOVERNANCE_PROGRAM_ID}
      SOLANA_ENERGY_TOKEN_PROGRAM_ID: ${SOLANA_ENERGY_TOKEN_PROGRAM_ID}
      ENERGY_TOKEN_MINT: ${ENERGY_TOKEN_MINT}
      AUTHORITY_WALLET_PATH: /app/dev-wallet.json
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_MODE: none
      SMTP_FROM: noreply@gridtokenx.com
      ENABLE_EMAIL_VERIFICATION: "true"
      EMAIL_VERIFICATION_REQUIRED: "true"
      EMAIL_VERIFICATION_BASE_URL: http://localhost:4000
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      PAYER_PRIVATE_KEY: ${PAYER_PRIVATE_KEY}
      ORACLE_BRIDGE_PUBLIC_KEY: ${ORACLE_BRIDGE_PUBLIC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Oracle Bridge + IoT Ingestion Gateway
  oracle-bridge:
    build:
      context: ./
      dockerfile: gridtokenx-oracle-bridge/Dockerfile
    container_name: gridtokenx-oracle-bridge
    ports:
      - "${IOT_GATEWAY_PORT:-4030}:4010"
    environment:
      RUST_LOG: debug,librdkafka=warn
      REDIS_URL: redis://redis:6379
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-gridtokenx}:${CLICKHOUSE_PASSWORD:-clickhouse_secret_2025}@clickhouse:8123/${CLICKHOUSE_DB:-gridtokenx}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@postgres:5432/gridtokenx
      TRADING_DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@postgres:5432/gridtokenx
      API_GATEWAY_URL: http://apisix:9080
      IAM_GRPC_URL: http://iam-service:8090
      TRADING_GRPC_URL: http://trading-service:8092
      GRIDTOKENX_API_KEYS: ${ENGINEERING_API_KEY:-engineering-department-api-key-2025},e2e-test-key
      SETTLEMENT_API_URL: http://trading-service:8093
      ORACLE_BRIDGE_SIGNING_KEY: /app/oracle-bridge-signing-key.bin
      OTEL_EXPORTER_OTLP_ENDPOINT: http://gridtokenx-otel-gateway:4317
      OTEL_SERVICE_NAME: gridtokenx-oracle-bridge
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
    volumes:
      - ./infra/oracle/signing-key.bin:/app/oracle-bridge-signing-key.bin:ro
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - gridtokenx-network
      - edge-tier
    restart: unless-stopped

  noti-service:
    build:
      context: ./
      dockerfile: gridtokenx-noti-service/Dockerfile
    container_name: gridtokenx-noti-service
    ports:
      - "${NOTI_HTTP_PORT:-4060}:8080"
      - "${NOTI_GRPC_PORT:-5060}:8090"
      - "${NOTI_GRPC_PORT:-5060}:8090/udp"
    environment:
      DATABASE_URL: postgres://gridtokenx_user:gridtokenx_password@postgres:5432/gridtokenx_noti
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka-cmd:9001
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      PORT: 8080
      RUST_LOG: debug
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_MODE: none
      SMTP_FROM: noreply@gridtokenx.com
      EMAIL_FROM_NAME: GridTokenX
      EMAIL_FROM_ADDRESS: noreply@gridtokenx.com
      CERT_FILE: /app/infra/certs/server.crt
      KEY_FILE: /app/infra/certs/server.key
    volumes:
      - ./infra/certs/server.crt:/app/infra/certs/server.crt:ro
      - ./infra/certs/server.key:/app/infra/certs/server.key:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Agent Trade Service (Algorithmic Trading)
  agent-trade:
    build:
      context: ./
      dockerfile: gridtokenx-agent-trade/Dockerfile
    container_name: gridtokenx-agent-trade
    environment:
      DATABASE_URL: sqlite:///app/data/agent.db
      RUST_LOG: debug,librdkafka=warn
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      IAM_GRPC_URL: http://iam-service:8090
      TRADING_GRPC_URL: http://trading-service:8092
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://gridtokenx-otel-gateway:4317
      OTEL_SERVICE_NAME: gridtokenx-agent-trade
    volumes:
      - agent_trade_data:/app/data
    depends_on:
      - kafka-market
      - iam-service
      - trading-service
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Trading Platform (Next.js)
  trading-ui:
    build:
      context: ./gridtokenx-trading
      dockerfile: Dockerfile
    container_name: gridtokenx-trading
    ports:
      - "${TRADING_UI_PORT:-11001}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
      NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4001}
      NEXT_PUBLIC_PYTH_PRICE_SERVICE_URL: ${NEXT_PUBLIC_PYTH_PRICE_SERVICE_URL}
      NEXT_PUBLIC_MAPBOX_TOKEN: YOUR_MAPBOX_TOKEN_HERE
    networks:
      - gridtokenx-network
    depends_on:
      iam-service:
        condition: service_healthy
      trading-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Mailpit SMTP Server (Development Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: gridtokenx-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP server
      - "${MAILPIT_WEB_PORT:-13060}:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: ${MP_MAX_MESSAGES}
      MP_DATABASE: ${MP_DATABASE}
      MP_SMTP_AUTH_ACCEPT_ANY: ${MP_SMTP_AUTH_ACCEPT_ANY}
      MP_SMTP_AUTH_ALLOW_INSECURE: ${MP_SMTP_AUTH_ALLOW_INSECURE}
      TZ: ${TZ}
    volumes:
      - mailpit_data:/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8025/api/v1/info",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
  # Smart Meter Simulator (Python/FastAPI)
  smartmeter-simulator:
    build:
      context: ./gridtokenx-smartmeter-simulator
      dockerfile: Dockerfile
    container_name: gridtokenx-smartmeter-simulator
    environment:
      TZ: ${TZ}
      PORT: 8080
      LOG_LEVEL: INFO
      PYTHONPATH: /app:/app/src
      AUTOSTART_SIMULATION: "true"
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      CLICKHOUSE_URL: http://${CLICKHOUSE_USER:-gridtokenx}:${CLICKHOUSE_PASSWORD:-clickhouse_secret_2025}@clickhouse:8123/${CLICKHOUSE_DB:-gridtokenx}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: your-influxdb-token
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@postgres:5432/gridtokenx
      API_SERVICES_URL: ${API_SERVICES_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://gridtokenx-otel-gateway:4317
      OTEL_SERVICE_NAME: gridtokenx-smartmeter-simulator
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_RESOURCE_ATTRIBUTES: deployment.environment=${ENVIRONMENT:-development}
    depends_on:
      kafka-cmd:
        condition: service_healthy
      kafka-market:
        condition: service_healthy
      kafka-audit:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./gridtokenx-smartmeter-simulator/data:/app/data
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Smart Meter Simulator UI (React/Next.js Static)
  smartmeter-ui:
    build:
      context: ./gridtokenx-smartmeter-simulator/frontend
      dockerfile: Dockerfile
    container_name: gridtokenx-smartmeter-ui
    environment:
      - NEXT_PUBLIC_SIMULATOR_URL=http://localhost:4001
    depends_on:
      - smartmeter-simulator
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: gridtokenx-loki
    ports:
      - "${LOKI_PORT:-6003}:3100"
    volumes:
      - ./docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    command: -config.file=/etc/loki/loki-config.yaml
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Tempo - Tracing Backend
  tempo:
    image: grafana/tempo:2.6.0
    container_name: gridtokenx-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_PORT:-6004}:3200" # Tempo HTTP
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # ============================================
  # Monitoring Stack: Prometheus + Grafana
  # ============================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: gridtokenx-prometheus
    ports:
      - "${PROMETHEUS_PORT:-6001}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--enable-feature=remote-write-receiver"
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gridtokenx-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - gridtokenx-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: gridtokenx-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    networks:
      - gridtokenx-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Kafka Exporter
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: gridtokenx-kafka-exporter
    command:
      [
        "--kafka.server=kafka-cmd:9001",
        "--kafka.server=kafka-market:9002",
        "--kafka.server=kafka-audit:9003",
      ]
    ports:
      - "9308:9308"
    networks:
      - gridtokenx-network
    depends_on:
      kafka-cmd:
        condition: service_healthy
      kafka-market:
        condition: service_healthy
      kafka-audit:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: gridtokenx-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gridtokenx-cadvisor
    ports:
      - "${CADVISOR_PORT:-6010}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:11.5.0
    container_name: gridtokenx-grafana
    ports:
      - "${GRAFANA_PORT:-6002}:3000" # Grafana HTTP
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:6002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - gridtokenx-network
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # OTEL Collector - Agent (Node-level collection)
  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: gridtokenx-otel-agent
    user: "0:0"
    command: ["--config", "/etc/otel-agent-config.yaml"]
    volumes:
      - ./otel-agent-config.yaml:/etc/otel-agent-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/hostfs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - gridtokenx-network
    depends_on:
      - otel-gateway
    restart: unless-stopped

  # OTEL Collector - Gateway (Central processing & routing)
  otel-gateway:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: gridtokenx-otel-gateway
    command: ["--config", "/etc/otel-gateway-config.yaml"]
    volumes:
      - ./otel-gateway-config.yaml:/etc/otel-gateway-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "8888:8888" # Metrics
    networks:
      - gridtokenx-network
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    restart: unless-stopped

  # HashiCorp Vault (Security Plane)
  vault:
    image: hashicorp/vault:1.15
    container_name: gridtokenx-vault
    ports:
      - "${VAULT_PORT:-13001}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.0:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Schema Registry (Confluent)
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: gridtokenx-schema-registry
    ports:
      - "${KAFKA_SCHEMA_REGISTRY_PORT:-9010}:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "PLAINTEXT://kafka-cmd:29001,PLAINTEXT://kafka-market:29002,PLAINTEXT://kafka-audit:29003"
    networks:
      - gridtokenx-network
    depends_on:
      kafka-cmd:
        condition: service_healthy
    restart: unless-stopped

networks:
  gridtokenx-network:
    driver: bridge
  user-tier:
    driver: bridge
  edge-tier:
    driver: bridge

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  redis_replica_data:
  influxdb_data:
  influxdb_config:
  mailpit_data:
  kafka_cmd_data:
  kafka_market_data:
  kafka_audit_data:
  clickhouse_data:
  rabbitmq_data:
  loki_data:
  tempo_data:
  minio_data:
  prometheus_data:
  grafana_data:
  agent_trade_data:
