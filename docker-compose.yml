services:
  # PostgreSQL Database for API (Primary)
  postgres:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_duration=on"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      # Replication settings
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "synchronous_commit=off"
    ports:
      - "${POSTGRES_PRIMARY_PORT:-7001}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-replication.sh:/docker-entrypoint-initdb.d/setup-replication.sh:ro
      - ./scripts/init-multi-db.sql:/docker-entrypoint-initdb.d/init-multi-db.sql:ro
    networks:
      - gridtokenx-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer - Lightweight Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: gridtokenx-pgbouncer
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-gridtokenx_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-gridtokenx_password}
      DB_NAME: ${POSTGRES_DB:-gridtokenx}
      # Additional databases via custom INI section
      PGBOUNCER_DATABASES: |
        gridtokenx = host=postgres port=5432 dbname=gridtokenx
        gridtokenx_noti = host=postgres port=5432 dbname=gridtokenx_noti
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      AUTH_TYPE: plain
    volumes:
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    ports:
      - "${PGBOUNCER_PORT:-6432}:6432"
    networks:
      - gridtokenx-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-gridtokenx_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgDog - Rust connection pooler / load balancer / sharder (https://docs.pgdog.dev)
  # Runs alongside PgBouncer; opt a service in by pointing its DATABASE_URL at
  # pgdog:6432 (host: localhost:${PGDOG_PORT:-7003}).
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    container_name: gridtokenx-pgdog
    command: ["pgdog", "--config", "/etc/pgdog/pgdog.toml", "--users", "/etc/pgdog/users.toml"]
    volumes:
      - ./docker/pgdog/pgdog.toml:/etc/pgdog/pgdog.toml:ro
      - ./docker/pgdog/users.toml:/etc/pgdog/users.toml:ro
    ports:
      - "${PGDOG_PORT:-7003}:6432"
    networks:
      - gridtokenx-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PostgreSQL Database for API (Replica)
  postgres-replica:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres-replica
    user: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRIMARY_HOST: postgres
      TZ: ${TZ}
    entrypoint: ["/bin/sh", "/scripts/init-replica.sh"]
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
    ports:
      - "${POSTGRES_REPLICA_PORT:-7002}:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/init-replica.sh:/scripts/init-replica.sh:ro
    networks:
      - gridtokenx-network
    depends_on:
      pgbouncer:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database for API (Cascading Replica)
  # Offloads WAL shipping overhead from primary to postgres-replica
  postgres-replica-cascade:
    image: postgres:17-alpine
    container_name: gridtokenx-postgres-replica-cascade
    user: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PRIMARY_HOST: postgres-replica
      TZ: ${TZ}
    entrypoint: ["/bin/sh", "/scripts/init-replica.sh"]
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "hot_standby=on"
    ports:
      - "7003:5432"
    volumes:
      - postgres_replica_cascade_data:/var/lib/postgresql/data
      - ./scripts/init-replica.sh:/scripts/init-replica.sh:ro
    networks:
      - gridtokenx-network
    depends_on:
      postgres-replica:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache for API (Primary)
  redis:
    image: redis:7-alpine
    container_name: gridtokenx-redis
    # AOF (appendonly) makes every write durable, not just periodic RDB
    # snapshots — device pubkeys (gridtokenx:devices:*:pubkey) survive a hard
    # restart instead of vanishing and 403-ing all signed telemetry until
    # re-onboarding. RDB save points kept as a secondary checkpoint.
    command: >-
      redis-server --appendonly yes --appendfsync everysec
      --save "3600 1 300 100 60 10000"
    environment:
      TZ: ${TZ}
    ports:
      - "${REDIS_PRIMARY_PORT:-7010}:6379"
    volumes:
      - redis_data:/data
    networks:
      - gridtokenx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Redis Cache for API (Replica)
  redis-replica:
    image: redis:7-alpine
    container_name: gridtokenx-redis-replica
    command: redis-server --replicaof redis 6379
    environment:
      TZ: ${TZ}
    ports:
      - "${REDIS_REPLICA_PORT:-7011}:6379"
    volumes:
      - redis_replica_data:/data
    networks:
      - gridtokenx-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO - Local S3 Simulation for Long-Term Retention
  minio:
    image: minio/minio:latest
    container_name: gridtokenx-minio
    ports:
      - "9005:9000" # API
      - "9006:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secret_2025
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # InfluxDB Time Series Database
  influxdb:
    image: influxdb:2.7-alpine
    container_name: gridtokenx-influxdb
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: "curl -f http://localhost:8086/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka cluster 1: Commands & Events (Low-volume, strict order, durable)
  kafka-cmd:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka-cmd
    ports:
      - "${KAFKA_CMD_PORT:-9001}:9001"
      - "29001:29001"
    environment:
      TZ: ${TZ}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-cmd:9004
      KAFKA_LISTENERS: PLAINTEXT://:9001,PLAINTEXT_HOST://:29001,CONTROLLER://:9004
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-cmd:9001,PLAINTEXT_HOST://localhost:29001
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_cmd_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka cluster 2: Market Data & Telemetry (High-TPS, ephemeral)
  kafka-market:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka-market
    ports:
      - "${KAFKA_MARKET_PORT:-9002}:9002"
      - "29002:29002"
    environment:
      TZ: ${TZ}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-market:9005
      KAFKA_LISTENERS: PLAINTEXT://:9002,PLAINTEXT_HOST://:29002,CONTROLLER://:9005
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-market:9002,PLAINTEXT_HOST://localhost:29002
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 10
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_market_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9002"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka cluster 3: Audit (Regulatory events, long retention)
  kafka-audit:
    image: apache/kafka:3.7.0
    container_name: gridtokenx-kafka-audit
    ports:
      - "${KAFKA_AUDIT_PORT:-9003}:9003"
      - "29003:29003"
    environment:
      TZ: ${TZ}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-audit:9006
      KAFKA_LISTENERS: PLAINTEXT://:9003,PLAINTEXT_HOST://:29003,CONTROLLER://:9006
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-audit:9003,PLAINTEXT_HOST://localhost:29003
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_audit_data:/var/lib/kafka/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9003"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # RabbitMQ Message Broker (Task Queues & RPC)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gridtokenx-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-9030}:5672" # AMQP Protocol
      - "${RABBITMQ_MGMT_PORT:-9031}:15672" # Management UI
    environment:
      TZ: ${TZ}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-gridtokenx}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}
      RABBITMQ_DEFAULT_VHOST: /
      # Performance tuning
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK_RELATIVE: "0.6"
      RABBITMQ_DISK_FREE_LIMIT: "50MB"
      # Enable plugins
      RABBITMQ_PLUGINS: "rabbitmq_management rabbitmq_prometheus"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    #      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # NATS JetStream - Blockchain TX Bus (chain.tx.submit / chain.tx.simulate)
  nats:
    image: nats:2.10-alpine
    container_name: gridtokenx-nats
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    ports:
      - "${NATS_CLIENT_PORT:-9020}:4222" # Client connections
      - "${NATS_MONITOR_PORT:-9021}:8222" # HTTP monitoring
    volumes:
      - nats_data:/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Apache APISIX - User Gateway (Public Internet / Web Clients)
  apisix:
    image: apache/apisix:3.15.0-debian
    container_name: gridtokenx-apisix
    environment:
      APISIX_STAND_ALONE: "true"
    ports:
      - "4001:9080" # User Proxy HTTP
      - "8443:9443" # User Proxy HTTPS (self-signed dev cert, see apisix.yaml ssl)
      - "8001:9180" # Admin HTTP
    volumes:
      - ./apisix_conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    networks:
      - gridtokenx-network
      - user-tier
    depends_on:
      - postgres
      - redis
    restart: always
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9080"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Envoy - Edge Gateway (IoT Devices / mTLS)
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: gridtokenx-envoy
    ports:
      - "4002:10000" # Edge Proxy
      - "8002:9901" # Envoy Admin
    volumes:
      - ./envoy_conf/envoy.yaml:/etc/envoy/envoy.yaml:ro
    networks:
      - edge-tier
      - gridtokenx-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9901/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  chain-bridge:
    build:
      context: ./
      dockerfile: gridtokenx-chain-bridge/Dockerfile
    container_name: gridtokenx-chain-bridge
    ports:
      - "${CHAIN_BRIDGE_GRPC_PORT:-5040}:5040"
    environment:
      CHAIN_BRIDGE_GRPC_PORT: 5040
      # mTLS by default; run `just gen-certs` first. Set CHAIN_BRIDGE_INSECURE=true in .env to bypass.
      CHAIN_BRIDGE_INSECURE: "${CHAIN_BRIDGE_INSECURE:-false}"
      CHAIN_BRIDGE_TLS_CERT: /app/infra/certs/server.crt
      CHAIN_BRIDGE_TLS_KEY: /app/infra/certs/server.key
      CHAIN_BRIDGE_TLS_CA: /app/infra/certs/ca.crt
      # Reject NATS envelopes without a valid mTLS-key signature. Default
      # false = log-only rollout; flip to true once nats_auth_unsigned is zero.
      CHAIN_BRIDGE_REQUIRE_SIGNED_NATS: "${CHAIN_BRIDGE_REQUIRE_SIGNED_NATS:-false}"
      SOLANA_RPC_URL: ${DOCKER_SOLANA_RPC_URL:-http://host.docker.internal:8899}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    volumes:
      - ./infra/certs/server.crt:/app/infra/certs/server.crt:ro
      - ./infra/certs/server.key:/app/infra/certs/server.key:ro
      - ./infra/certs/ca.crt:/app/infra/certs/ca.crt:ro
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/5040"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped

  iam-service:
    build:
      context: ./
      dockerfile: gridtokenx-iam-service/Dockerfile
    container_name: gridtokenx-iam-service
    ports:
      - "${IAM_HTTP_PORT:-4010}:8080"
      - "${IAM_GRPC_PORT:-5010}:8090"
    environment:
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@pgbouncer:5432/gridtokenx
      REDIS_URL: redis://redis:6379
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      IAM_PORT: 8080
      IAM_GRPC_PORT: 8090
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      RUST_LOG: debug,librdkafka=warn
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      API_KEY_SECRET: ${API_KEY_SECRET}
      ENVIRONMENT: development
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      VAULT_TRANSIT_KEY_NAME: gridtokenx-user-wallets
      CHAIN_BRIDGE_URL: ${CHAIN_BRIDGE_URL:-http://chain-bridge:5040}
      CHAIN_BRIDGE_INSECURE: "${CHAIN_BRIDGE_INSECURE:-false}"
      CHAIN_BRIDGE_CA_CERT: /app/infra/certs/ca.crt
      CHAIN_BRIDGE_CLIENT_CERT: /app/infra/certs/client.crt
      CHAIN_BRIDGE_CLIENT_KEY: /app/infra/certs/client.key
      CHAIN_BRIDGE_TLS_DOMAIN: chain-bridge
      CHAIN_BRIDGE_SERVICE_IDENTITY: spiffe://gridtokenx.th/prod/iam-service
      SOLANA_PAYER_KEY: ${SOLANA_PAYER_KEY}
      SOLANA_REGISTRY_PROGRAM_ID: ${SOLANA_REGISTRY_PROGRAM_ID}
      SOLANA_TRADING_PROGRAM_ID: ${SOLANA_TRADING_PROGRAM_ID}
      SOLANA_ORACLE_PROGRAM_ID: ${SOLANA_ORACLE_PROGRAM_ID}
      SOLANA_GOVERNANCE_PROGRAM_ID: ${SOLANA_GOVERNANCE_PROGRAM_ID}
      SOLANA_ENERGY_TOKEN_PROGRAM_ID: ${SOLANA_ENERGY_TOKEN_PROGRAM_ID}
      ENERGY_TOKEN_MINT: ${ENERGY_TOKEN_MINT}
      CURRENCY_TOKEN_MINT: ${CURRENCY_TOKEN_MINT}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-localnet}
      AUTHORITY_WALLET_PATH: /app/dev-wallet.json
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_MODE: none
      SMTP_FROM: noreply@gridtokenx.com
      ENABLE_EMAIL_VERIFICATION: "true"
      EMAIL_VERIFICATION_REQUIRED: "true"
      EMAIL_VERIFICATION_BASE_URL: http://localhost:4001
      OWS_VAULT_PATH: /var/lib/gridtokenx/ows-vault
    volumes:
      - ./dev-wallet.json:/app/dev-wallet.json
      - iam_ows_vault:/var/lib/gridtokenx/ows-vault
      - ./infra/certs/ca.crt:/app/infra/certs/ca.crt:ro
      - ./infra/certs/clients/iam-service.crt:/app/infra/certs/client.crt:ro
      - ./infra/certs/clients/iam-service.key:/app/infra/certs/client.key:ro
    depends_on:
      pgbouncer:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      chain-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Trading Service
  trading-service:
    build:
      context: ./
      dockerfile: gridtokenx-trading-service/Dockerfile
    container_name: gridtokenx-trading-service
    ports:
      - "${TRADING_GRPC_PORT:-5020}:8092"
      - "${TRADING_HTTP_PORT:-4020}:8093"
    volumes:
      - ./dev-wallet.json:/app/dev-wallet.json
      - ./infra/certs/ca.crt:/app/infra/certs/ca.crt:ro
      - ./infra/certs/clients/trading-service-api.crt:/app/infra/certs/client.crt:ro
      - ./infra/certs/clients/trading-service-api.key:/app/infra/certs/client.key:ro
    environment:
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@pgbouncer:5432/gridtokenx
      REDIS_URL: redis://redis:6379
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      KAFKA_BROKERS: kafka-cmd:9001
      # Publish domain events to Kafka (off by default → Redis Streams only).
      # noti-service consumes `${KAFKA_TOPIC_PREFIX}.triggers` for price alerts.
      KAFKA_EVENTS_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka-cmd:9001
      KAFKA_TOPIC_PREFIX: trading
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      RUST_LOG: debug,librdkafka=warn
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      SOLANA_RPC_URL: ${DOCKER_SOLANA_RPC_URL:-http://host.docker.internal:8899}
      CHAIN_BRIDGE_URL: ${CHAIN_BRIDGE_URL:-http://chain-bridge:5040}
      CHAIN_BRIDGE_INSECURE: "${CHAIN_BRIDGE_INSECURE:-false}"
      CHAIN_BRIDGE_CA_CERT: /app/infra/certs/ca.crt
      CHAIN_BRIDGE_CLIENT_CERT: /app/infra/certs/client.crt
      CHAIN_BRIDGE_CLIENT_KEY: /app/infra/certs/client.key
      CHAIN_BRIDGE_TLS_DOMAIN: chain-bridge
      CHAIN_BRIDGE_SERVICE_IDENTITY: spiffe://gridtokenx.th/prod/trading-service/api
      SOLANA_PAYER_KEY: EzudwoHvNPAc4dpPi5ndU8MEZVHVzq3Pj3Thm9ooKmiJ
      SOLANA_WS_URL: ${SOLANA_WS_URL:-ws://host.docker.internal:8002}
      IAM_SERVICE_URL: http://apisix:9080
      INTERNAL_API_KEY: ${ENGINEERING_API_KEY:-engineering-department-api-key-2025}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-localnet}
      SOLANA_REGISTRY_PROGRAM_ID: ${SOLANA_REGISTRY_PROGRAM_ID}
      SOLANA_TRADING_PROGRAM_ID: ${SOLANA_TRADING_PROGRAM_ID}
      SOLANA_ORACLE_PROGRAM_ID: ${SOLANA_ORACLE_PROGRAM_ID}
      SOLANA_GOVERNANCE_PROGRAM_ID: ${SOLANA_GOVERNANCE_PROGRAM_ID}
      SOLANA_ENERGY_TOKEN_PROGRAM_ID: ${SOLANA_ENERGY_TOKEN_PROGRAM_ID}
      ENERGY_TOKEN_MINT: ${ENERGY_TOKEN_MINT}
      AUTHORITY_WALLET_PATH: /app/dev-wallet.json
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_MODE: none
      SMTP_FROM: noreply@gridtokenx.com
      ENABLE_EMAIL_VERIFICATION: "true"
      EMAIL_VERIFICATION_REQUIRED: "true"
      EMAIL_VERIFICATION_BASE_URL: http://localhost:4001
      AES_KEY_BASE64: ${AES_KEY_BASE64}
      PAYER_PRIVATE_KEY: ${PAYER_PRIVATE_KEY}
      AGGREGATOR_BRIDGE_PUBLIC_KEY: ${AGGREGATOR_BRIDGE_PUBLIC_KEY:-}
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      iam-service:
        condition: service_healthy
      chain-bridge:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Aggregator Bridge + IoT Ingestion Gateway
  aggregator-bridge:
    build:
      context: ./
      dockerfile: gridtokenx-aggregator-bridge/Dockerfile
    container_name: gridtokenx-aggregator-bridge
    ports:
      - "${IOT_GATEWAY_PORT:-4030}:4010" # REST API
      - "${GRPC_PORT:-50051}:50051" # gRPC ingestion (smart meter simulator)
    environment:
      RUST_LOG: debug,librdkafka=warn
      # Container defaults GRPC_PORT=5030; pin to 50051 so the host port mapping
      # above actually reaches the gRPC ingestion listener.
      GRPC_PORT: 50051
      REDIS_URL: redis://redis:6379
      KAFKA_CMD_BROKERS: kafka-cmd:9001
      KAFKA_MARKET_BROKERS: kafka-market:9002
      KAFKA_AUDIT_BROKERS: kafka-audit:9003
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@pgbouncer:5432/gridtokenx
      TRADING_DATABASE_URL: postgresql://gridtokenx_user:gridtokenx_password@pgbouncer:5432/gridtokenx
      API_GATEWAY_URL: http://apisix:9080
      IAM_GRPC_URL: http://apisix:9080
      TRADING_GRPC_URL: http://apisix:9080
      GRIDTOKENX_API_KEYS: ${ENGINEERING_API_KEY:-engineering-department-api-key-2025},e2e-test-key
      SETTLEMENT_API_URL: http://apisix:9080
      AGGREGATOR_BRIDGE_SIGNING_KEY: /app/aggregator-bridge-signing-key.bin
      NATS_URL: nats://nats:4222
      KAFKA_BOOTSTRAP_SERVERS: kafka-market:9002
      KAFKA_TOPIC_METER_READINGS: meter.readings
      # Path B generation-mint via Chain Bridge: aggregator builds UNSIGNED GRID mint
      # tx and submits over NATS; Chain Bridge (Vault platform_admin) signs + sends.
      MINT_VIA_CHAIN_BRIDGE: "true"
      CHAIN_BRIDGE_URL: http://chain-bridge:5040
      CHAIN_BRIDGE_INSECURE: "${CHAIN_BRIDGE_INSECURE:-false}"
      CHAIN_BRIDGE_CA_CERT: /app/infra/certs/ca.crt
      CHAIN_BRIDGE_CLIENT_CERT: /app/infra/certs/client.crt
      CHAIN_BRIDGE_CLIENT_KEY: /app/infra/certs/client.key
      CHAIN_BRIDGE_TLS_DOMAIN: chain-bridge
      CHAIN_BRIDGE_SERVICE_IDENTITY: spiffe://gridtokenx.th/prod/aggregator-bridge
      SOLANA_RPC_URL: http://host.docker.internal:8899
      # IAM gRPC (ConnectRPC) for GetUserWallet — the mint path resolves each bin's
      # recipient wallet here. The identity client reads IAM_SERVICE_URL (not IAM_GRPC_URL).
      IAM_SERVICE_URL: http://iam-service:8090
    volumes:
      - ./infra/aggregator-bridge/signing-key.bin:/app/aggregator-bridge-signing-key.bin:ro
      - ./infra/certs/ca.crt:/app/infra/certs/ca.crt:ro
      - ./infra/certs/clients/aggregator-bridge.crt:/app/infra/certs/client.crt:ro
      - ./infra/certs/clients/aggregator-bridge.key:/app/infra/certs/client.key:ro
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nats:
        condition: service_healthy
      kafka-market:
        condition: service_healthy
    networks:
      - gridtokenx-network
      - edge-tier
    restart: unless-stopped

  noti-service:
    build:
      context: ./
      dockerfile: gridtokenx-noti-service/Dockerfile
    container_name: gridtokenx-noti-service
    ports:
      - "${NOTI_HTTP_PORT:-4060}:8080"
      - "${NOTI_GRPC_PORT:-5060}:8090"
      - "${NOTI_GRPC_PORT:-5060}:8090/udp"
    environment:
      DATABASE_URL: postgres://gridtokenx_user:gridtokenx_password@pgbouncer:5432/gridtokenx_noti
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka-cmd:9001
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-gridtokenx}:${RABBITMQ_DEFAULT_PASS:-rabbitmq_secret_2025}@rabbitmq:5672
      PORT: 8080
      RUST_LOG: debug
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS_MODE: none
      SMTP_FROM: noreply@gridtokenx.com
      EMAIL_FROM_NAME: GridTokenX
      EMAIL_FROM_ADDRESS: noreply@gridtokenx.com
      CERT_FILE: /app/infra/certs/server.crt
      KEY_FILE: /app/infra/certs/server.key
    volumes:
      - ./infra/certs/server.crt:/app/infra/certs/server.crt:ro
      - ./infra/certs/server.key:/app/infra/certs/server.key:ro
    depends_on:
      pgbouncer:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Trading Platform (Next.js)
  trading-ui:
    build:
      context: ./gridtokenx-trading
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN:-pk.eyJ1IjoiMjQxMDcxNzMwMjAwMyIsImEiOiJjbW54ZXJrNTMwMXJ0MnFzYmNhdTdsMHpwIn0.UI7eEeQCjjUDpv0ZWfUk4w}
    container_name: gridtokenx-trading
    ports:
      - "${TRADING_UI_PORT:-11001}:3000"
    environment:
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4001}
      NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4001}
      NEXT_PUBLIC_PYTH_PRICE_SERVICE_URL: ${NEXT_PUBLIC_PYTH_PRICE_SERVICE_URL}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN:-pk.eyJ1IjoiMjQxMDcxNzMwMjAwMyIsImEiOiJjbW54ZXJrNTMwMXJ0MnFzYmNhdTdsMHpwIn0.UI7eEeQCjjUDpv0ZWfUk4w}
    networks:
      - gridtokenx-network
    depends_on:
      iam-service:
        condition: service_healthy
      trading-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Mailpit SMTP Server (Development Email Testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: gridtokenx-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025" # SMTP server
      - "${MAILPIT_WEB_PORT:-13060}:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: ${MP_MAX_MESSAGES}
      MP_DATABASE: ${MP_DATABASE}
      MP_SMTP_AUTH_ACCEPT_ANY: ${MP_SMTP_AUTH_ACCEPT_ANY}
      MP_SMTP_AUTH_ALLOW_INSECURE: ${MP_SMTP_AUTH_ALLOW_INSECURE}
      TZ: ${TZ}
    volumes:
      - mailpit_data:/data
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8025/api/v1/info",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
  # Smart Meter Simulator (Python/FastAPI)
  smartmeter-simulator:
    build:
      context: ./gridtokenx-smartmeter-simulator
      dockerfile: Dockerfile
    container_name: gridtokenx-smartmeter-simulator
    environment:
      TZ: ${TZ}
      PORT: 8082
      LOG_LEVEL: INFO
      PYTHONPATH: /app:/app/src
      AUTOSTART_SIMULATION: "true"
      METRICS_PORT: 9091
      # DLMS/COSEM REST egress to the Aggregator Bridge IoT gateway. In-network
      # the bridge ingest is aggregator-bridge:4010 (host maps it to :4030).
      AGGREGATOR_BRIDGE_URL: http://aggregator-bridge:4010
      AGGREGATOR_DLMS_ENABLED: ${SMARTMETER_DLMS_ENABLED:-false}
      # Bridge meter-pubkey registry. In-network Redis is redis:6379.
      REDIS_URL: redis://redis:6379
      # IAM onboarding (register->login->claim) via the APISIX user gateway.
      IAM_GATEWAY_URL: http://apisix:9080
      AGGREGATOR_IAM_ONBOARD_ENABLED: ${SMARTMETER_IAM_ONBOARD_ENABLED:-false}
      # PostGIS persistence of per-tick readings. Routed through pgbouncer.
      POSTGIS_URL: postgresql://gridtokenx_user:gridtokenx_password@pgbouncer:5432/gridtokenx
      POSTGIS_ENABLED: ${SMARTMETER_POSTGIS_ENABLED:-false}
    ports:
      - "${SMARTMETER_PORT:-8082}:8082" # REST API + /docs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      aggregator-bridge:
        condition: service_started
    volumes:
      - ./gridtokenx-smartmeter-simulator/data:/app/data
      - ./gridtokenx-smartmeter-simulator/backend/src/smart_meter_simulator:/app/src/smart_meter_simulator:rw
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/v1/quality/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # Smart Meter Simulator UI (React/Next.js Static)
  smartmeter-ui:
    build:
      context: ./gridtokenx-smartmeter-simulator/frontend
      dockerfile: Dockerfile
      args:
        SIMULATOR_URL: http://smartmeter-simulator:8082
    container_name: gridtokenx-smartmeter-ui
    environment:
      - NEXT_PUBLIC_SIMULATOR_URL=http://apisix.gridtokenx-coresystem.orb.local
      # Server-side rewrite target (next.config rewrites /api -> backend).
      - SIMULATOR_URL=http://smartmeter-simulator:8082
    ports:
      - "${SMARTMETER_UI_PORT:-12011}:3000" # Next.js dashboard
    depends_on:
      - smartmeter-simulator
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Monitoring Stack: Prometheus + Grafana
  # ============================================

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: gridtokenx-prometheus
    ports:
      - "${PROMETHEUS_PORT:-6001}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--enable-feature=remote-write-receiver"
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gridtokenx-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - gridtokenx-network
    depends_on:
      pgbouncer:
        condition: service_started
    restart: unless-stopped

  # Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: gridtokenx-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    networks:
      - gridtokenx-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Kafka Exporter
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: gridtokenx-kafka-exporter
    command:
      [
        "--kafka.server=kafka-cmd:9001",
        "--kafka.server=kafka-market:9002",
        "--kafka.server=kafka-audit:9003",
      ]
    ports:
      - "9308:9308"
    networks:
      - gridtokenx-network
    depends_on:
      kafka-cmd:
        condition: service_healthy
      kafka-market:
        condition: service_healthy
      kafka-audit:
        condition: service_healthy
    restart: unless-stopped

  # Node Exporter (Host Metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: gridtokenx-node-exporter
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    ports:
      - "9100:9100"
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: gridtokenx-cadvisor
    ports:
      - "${CADVISOR_PORT:-6010}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - gridtokenx-network
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:11.5.0
    container_name: gridtokenx-grafana
    ports:
      - "${GRAFANA_PORT:-6002}:3000" # Grafana HTTP
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:6002
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - gridtokenx-network
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # HashiCorp Vault (Security Plane)
  vault:
    image: hashicorp/vault:1.15
    container_name: gridtokenx-vault
    ports:
      - "${VAULT_PORT:-13001}:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    networks:
      - gridtokenx-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gridtokenx-network:
    driver: bridge
  user-tier:
    driver: bridge
  edge-tier:
    driver: bridge

volumes:
  iam_ows_vault:
    driver: local
  postgres_data:
  postgres_replica_data:
  postgres_replica_cascade_data:
  redis_data:
  redis_replica_data:
  influxdb_data:
  influxdb_config:
  mailpit_data:
  kafka_cmd_data:
  kafka_market_data:
  kafka_audit_data:
  rabbitmq_data:
  nats_data:
  minio_data:
  prometheus_data:
  grafana_data:
