plugin_configs:
  - id: 1 # Shared JWT auth + user-id extraction + CORS
    plugins:
      jwt-auth:
        key_claim_name: iss
        store_in_ctx: true
      serverless-post-function:
        phase: access
        functions:
          - "return function(conf, ctx)
               local payload = ctx.jwt_auth_payload or ctx.jwt_payload or (ctx.state and ctx.state.jwt) or ctx.consumer
               local sub = payload and payload.sub
               if not sub and ctx.jwt_payload then sub = ctx.jwt_payload.sub end
               if sub then
                 ngx.req.set_header('x-gridtokenx-user-id', sub)
                 ngx.req.set_header('x-gridtokenx-role', 'api-gateway')
                 ngx.req.set_header('x-gridtokenx-gateway-secret', os.getenv('GRIDTOKENX_GATEWAY_SECRET') or 'gridtokenx-gateway-secret-2025')
               end
             end"
      cors: {}

routes:
  - id: 10 # IAM Public REST (Auth & Config)
    uris:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/verify
      - /api/v1/auth/forgot-password
      - /api/v1/auth/reset-password
      - /api/v1/auth/logout
      - /api/v1/auth/refresh
      - /api/v1/auth/resend-verification
      - /api/v1/auth/wallet/verify
      - /api/v1/system/config
    plugins:
      proxy-rewrite:
        headers:
          set:
            x-gridtokenx-role: "api-gateway"
            x-gridtokenx-gateway-secret: "gridtokenx-gateway-secret-2025"
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "iam-service:8080": 1
        "host.docker.internal:4010": 1

  - id: 11 # IAM Private REST (Direct Routes)
    uris:
      - /api/v1/auth/change-password
      - /api/v1/profile
      - /api/v1/me
      - /api/v1/me/*
      - /api/v1/wallets
      - /api/v1/wallets/*
      - /api/v1/onboarding/*
      - /api/v1/identity
      - /api/v1/identity/*
      - /api/v1/meters
      - /api/v1/meters/*
      - /api/v1/me/meters
    plugin_config_id: 1
    upstream:
      type: roundrobin
      nodes:
        "iam-service:8080": 1
        "host.docker.internal:4010": 1

  - id: 110 # IAM Private REST (User Private surface)
    # IAM serves these natively under /api/v1/users/me/* (see iam-service
    # startup.rs: link_wallet, list_wallets, onchain-profile, get_me). Pass the
    # path through UNMODIFIED — a prior regex_uri rewrite to /api/v1/me/* drifted
    # against IAM's routes and 404'd the whole user-private surface (verified:
    # POST /api/v1/users/me/wallets returned 404 via gateway, 200 direct-to-IAM).
    uris:
      - /api/v1/users/me
      - /api/v1/users/me/*
    plugin_config_id: 1
    upstream:
      type: roundrobin
      nodes:
        "iam-service:8080": 1
        "host.docker.internal:4010": 1

  - id: 2 # Trading REST (Direct / Legacy Routes)
    uris:
      - /api/v1/orders
      - /api/v1/orders/*
      - /api/v1/quotes
      - /api/v1/zones/*
      - /api/v1/stats
      - /api/v1/futures/*
      - /api/v1/analytics/*
      - /api/v1/trades
      - /api/v1/trades/*
      - /api/v1/price-alerts
      - /api/v1/price-alerts/*
      - /api/v1/transactions
      - /api/v1/carbon/*
      - /api/v1/settlement/*
      - /api/v1/wallets/*/balance
      - /api/v1/markets/config
      - /api/v1/markets/matching-status
      - /api/v1/markets/settlement-stats
      - /api/v1/markets/orderbook
      - /api/v1/markets/p2p/*
    plugin_config_id: 1
    upstream:
      type: roundrobin
      nodes:
        "trading-service:8093": 1
        "host.docker.internal:8093": 1

  - id: 20 # Trading REST - User Private Routes Rewrite
    uris:
      - /api/v1/users/me/orders
      - /api/v1/users/me/orders/*
      - /api/v1/users/me/trades
      - /api/v1/users/me/trades/*
      - /api/v1/users/me/futures/*
      - /api/v1/users/me/analytics/*
      - /api/v1/users/me/transactions
      - /api/v1/users/me/carbon/*
      - /api/v1/users/me/wallets/*/balance
    plugin_config_id: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/users/me/(orders|trades|futures|analytics|transactions|carbon|wallets)(.*)", "/api/v1/$1$2"]
    upstream:
      type: roundrobin
      nodes:
        "trading-service:8093": 1
        "host.docker.internal:8093": 1

  - id: 21 # Trading REST - Market Stats Route Rewrite
    uris:
      - /api/v1/markets/stats
    plugin_config_id: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/markets/stats", "/api/v1/stats"]
    upstream:
      type: roundrobin
      nodes:
        "trading-service:8093": 1
        "host.docker.internal:8093": 1

  - id: 22 # Trading REST - Market Zones Book Rewrite
    uris:
      - /api/v1/markets/zones/*/order-book
    plugin_config_id: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/markets/zones/(.*)/order-book", "/api/v1/zones/$1/book"]
    upstream:
      type: roundrobin
      nodes:
        "trading-service:8093": 1
        "host.docker.internal:8093": 1

  - id: 3 # Notification Service (Direct / WS)
    uris:
      - /api/v1/notifications
      - /api/v1/notifications/*
      - /ws
    plugin_config_id: 1
    upstream:
      type: roundrobin
      nodes:
        "noti-service:8080": 1
        "host.docker.internal:5050": 1

  - id: 30 # Notification Service - Mark All Read Rewrite
    uris:
      - /api/v1/users/me/notifications/mark-all-read
    plugin_config_id: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/users/me/notifications/mark-all-read", "/api/v1/notifications/read-all"]
    upstream:
      type: roundrobin
      nodes:
        "noti-service:8080": 1
        "host.docker.internal:5050": 1

  - id: 31 # Notification Service - User Notification Route Rewrite
    uris:
      - /api/v1/users/me/notifications
      - /api/v1/users/me/notifications/*
    plugin_config_id: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/users/me/notifications(.*)", "/api/v1/notifications$1"]
    upstream:
      type: roundrobin
      nodes:
        "noti-service:8080": 1
        "host.docker.internal:5050": 1

  - id: 32 # Notification Service - Frontend /noti Alias Rewrite
    uris:
      - /api/v1/noti
      - /api/v1/noti/*
    plugin_config_id: 1
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/noti(.*)", "/api/v1/notifications$1"]
    upstream:
      type: roundrobin
      nodes:
        "noti-service:8080": 1
        "host.docker.internal:5050": 1

  - id: 4 # Smart Meter Simulator - Grid (Public)
    uris:
      - /api/v1/public/grid-*
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/public/grid-(.*)", "/api/v1/grid/$1"]
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "smartmeter-simulator:8082": 1
        "host.docker.internal:12010": 1

  - id: 5 # Smart Meter Simulator - Meters (Public)
    uris:
      - /api/v1/public/meters
      - /api/v1/public/meters/*
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/public/meters(.*)", "/api/meters$1"]
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "smartmeter-simulator:8082": 1
        "host.docker.internal:12010": 1

  - id: 9 # Smart Meter Simulator - WebSocket (Public)
    uris:
      - /api/market/ws
    enable_websocket: true
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/market/ws", "/ws"]
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "smartmeter-simulator:8082": 1
        "host.docker.internal:12010": 1

  - id: 8 # Health & Metrics
    uris:
      - /health
      - /metrics
    upstream:
      type: roundrobin
      nodes:
        "iam-service:8080": 1
        "host.docker.internal:4010": 1

  - id: 100 # IAM gRPC (ConnectRPC)
    uris:
      - /identity.IdentityService/*
    upstream:
      type: roundrobin
      nodes:
        "iam-service:8090": 1
        "host.docker.internal:5010": 1

  - id: 101 # Trading gRPC (ConnectRPC)
    uris:
      - /trading.TradingService/*
    upstream:
      type: roundrobin
      nodes:
        "trading-service:8092": 1
        "host.docker.internal:8092": 1

  - id: 40 # Smart Meter Simulator - Simulation Control
    uris:
      - /api/v1/simulation
      - /api/v1/simulation/*
    plugins:
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "smartmeter-simulator:8082": 1
        "host.docker.internal:12010": 1

  - id: 41 # Smart Meter Simulator - Meters Admin/Direct
    uris:
      - /api/v1/meters
      - /api/v1/meters/*
    plugins:
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "smartmeter-simulator:8082": 1
        "host.docker.internal:12010": 1

  - id: 42 # Smart Meter Simulator - Microgrid endpoints
    uris:
      - /api/v1/boundary
      - /api/v1/feeders
      - /api/v1/pcc
      - /api/v1/center
      - /api/v1/status
    plugins:
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "smartmeter-simulator:8082": 1
        "host.docker.internal:12010": 1

  - id: 50 # Solana JSON-RPC proxy (browser web3.js reads/writes)
    uris:
      - /api/v1/rpc
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/rpc$", "/"]
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:8899": 1

  - id: 51 # Solana JSON-RPC WebSocket proxy
    uris:
      - /api/v1/rpc-ws
    enable_websocket: true
    plugins:
      proxy-rewrite:
        regex_uri: ["^/api/v1/rpc-ws$", "/"]
      cors: {}
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:8002": 1

