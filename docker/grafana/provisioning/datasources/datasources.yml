apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        # Services log JSON via gridtokenx-telemetry; the trace id surfaces as a
        # "trace_id":"<hex>" field. Link it to the Tempo trace.
        - datasourceUid: tempo
          matcherRegex: "\"trace_id\":\"(\\w+)\""
          name: TraceID
          url: "$${__value.raw}"

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: 'prometheus'
      nodeGraph:
        enabled: true
      traceQuery:
        type: 'traceql'
      lokiSearch:
        datasourceUid: 'loki'
      serviceGraph:
        datasourceUid: 'prometheus'
      tracesToLogsV2:
        datasourceUid: 'loki'
        # Map trace resource attributes → Loki labels when jumping trace→logs.
        tags: [{ key: 'service.name', value: 'service' }]
        filterByTraceId: true
        filterBySpanId: false
