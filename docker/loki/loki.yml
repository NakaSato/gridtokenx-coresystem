# Single-binary Loki for the GridTokenX dev/observability stack.
# Filesystem storage, no auth (private gridtokenx-network only), short retention.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Structured metadata lets us attach `level` cheaply without promoting it to a
  # stream label (which would explode cardinality). Required for the `level` hint.
  allow_structured_metadata: true
  retention_period: 336h # 14 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  reject_old_samples: true
  # Match the retention window so Alloy replaying historical container logs on
  # startup (kafka brokers keep days of stdout) isn't rejected as "too old".
  reject_old_samples_max_age: 336h

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

analytics:
  reporting_enabled: false
