global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'gridtokenx-monitor'
    origin: 'prometheus-primary'

# Alerting + recording rules. Both files are promtool-clean (the historical
# VPPAssetOffline / PostgreSQLSlowQueries parse errors in gridtokenx-alerts.yml
# were fixed). A broken rule file fails Prometheus startup, so keep them validated
# (`promtool check rules`) before changing this glob.
rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Aggregator Bridge /metrics is served on the IoT gateway port behind mTLS
  # (IOT_GATEWAY_TLS_* + IOT_GATEWAY_TLS_CLIENT_CA). Prometheus presents the shared
  # dev client cert; server_name matches the cert SAN, not the compose DNS alias.
  - job_name: 'aggregator-bridge'
    scheme: https
    metrics_path: /metrics
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      cert_file: /etc/prometheus/certs/client.crt
      key_file: /etc/prometheus/certs/client.key
      server_name: aggregator-bridge
    static_configs:
      - targets: ['aggregator-bridge:4010']

  # IAM Service — real metrics_exporter_prometheus endpoint (container port 8080)
  - job_name: 'iam-service'
    static_configs:
      - targets: ['iam-service:8080']

  # Chain Bridge — dedicated plaintext metrics server (CHAIN_BRIDGE_METRICS_PORT),
  # separate from the mTLS gRPC port 5040.
  - job_name: 'chain-bridge'
    static_configs:
      - targets: ['chain-bridge:9464']

  - job_name: 'trading-service'
    static_configs:
      - targets: ['trading-service:8093']

  - job_name: 'meter-service'
    static_configs:
      - targets: ['meter-service:8080']

  - job_name: 'noti-service'
    static_configs:
      - targets: ['noti-service:8080']

  - job_name: 'infrastructure'
    static_configs:
      - targets: ['postgres-exporter:9187', 'redis-exporter:9121', 'kafka-exporter:9308', 'node-exporter:9100', 'cadvisor:8080']

  # PgDog (sole Postgres pooler) — native OpenMetrics endpoint (openmetrics_port=9090).
  - job_name: 'pgdog'
    static_configs:
      - targets: ['pgdog:9090']

