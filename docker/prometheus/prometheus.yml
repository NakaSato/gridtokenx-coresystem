global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'gridtokenx-monitor'
    origin: 'prometheus-primary'

# Remote write to long-term storage (e.g., Thanos/Mimir)
remote_write:
  - url: "http://mimir:8080/api/v1/push" # Placeholder for future scalable backend
    queue_config:
      capacity: 10000
      max_shards: 100
      min_shards: 1
      max_samples_per_send: 500
      batch_send_deadline: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'infrastructure'
    static_configs:
      - targets: ['postgres-exporter:9187', 'redis-exporter:9121', 'kafka-exporter:9308', 'node-exporter:9100', 'cadvisor:8080']

  # PgDog (sole Postgres pooler) — native OpenMetrics endpoint (openmetrics_port=9090).
  - job_name: 'pgdog'
    static_configs:
      - targets: ['pgdog:9090']

