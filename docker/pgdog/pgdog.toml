# PgDog — connection pooler / load balancer for PostgreSQL (https://docs.pgdog.dev)
# Sole Postgres pooler for the stack (replaced PgBouncer). Every service points its
# DATABASE_URL at pgdog:6432. Container port 6432, host port ${PGDOG_PORT:-7003}.

[general]
host = "0.0.0.0"
port = 6432
# session (not transaction): sqlx::migrate!'s pg_advisory_lock is session-scoped —
# transaction pooling let the pooler hand the locked connection to another client,
# leaking the lock forever and deadlocking every future migration attempt.
pooler_mode = "session"
# Session mode pins one backend connection per client for its whole session (no
# more per-transaction multiplexing), so this must cover total concurrent app
# connections, not just peak in-flight transactions. Postgres max_connections=200;
# 80 here x 2 databases leaves headroom for admin/exporter connections.
default_pool_size = 80
min_pool_size = 5
# HTTP healthcheck endpoint (used by the compose healthcheck).
healthcheck_port = 9000
# Prometheus/OpenMetrics endpoint.
openmetrics_port = 9090

# Primary-only: the read replicas were removed from the stack, so there is no
# replica backend to split reads to. Re-add role="replica" [[databases]] entries
# (plus load_balancing_strategy / read_write_split keys) if replicas return.

[[databases]]
name = "gridtokenx"
host = "postgres"
port = 5432
role = "primary"

[[databases]]
name = "gridtokenx_noti"
host = "postgres"
port = 5432
role = "primary"
