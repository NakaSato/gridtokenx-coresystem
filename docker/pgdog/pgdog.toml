# PgDog — connection pooler / load balancer for PostgreSQL (https://docs.pgdog.dev)
# Sole Postgres pooler for the stack (replaced PgBouncer). Every service points its
# DATABASE_URL at pgdog:6432. Container port 6432, host port ${PGDOG_PORT:-7003}.

[general]
host = "0.0.0.0"
port = 6432
# Default is transaction mode (best multiplexing/throughput). The two
# *_migrate aliases below override to session mode — sqlx::migrate!'s
# pg_advisory_lock is session-scoped, and transaction pooling let the pooler
# hand the locked connection to another client, leaking the lock forever and
# deadlocking every future migration attempt. Only the migration step needs
# session semantics; regular app traffic does not, so it stays transaction.
pooler_mode = "transaction"
default_pool_size = 20
min_pool_size = 5
# HTTP healthcheck endpoint (used by the compose healthcheck).
healthcheck_port = 9000
# Prometheus/OpenMetrics endpoint.
openmetrics_port = 9090

# Primary-only: the read replicas were removed from the stack, so there is no
# replica backend to split reads to. Re-add role="replica" [[databases]] entries
# (plus load_balancing_strategy / read_write_split keys) if replicas return.

[[databases]]
name = "gridtokenx"
host = "postgres"
port = 5432
role = "primary"
pooler_mode = "transaction"

# Alias for iam-service's sqlx::migrate! step only — same physical DB as
# "gridtokenx" (database_name), routed to its own session-mode pool so the
# migration's advisory lock can't leak into the shared transaction pool.
# Small pool: only ever one migration connection at a time.
[[databases]]
name = "gridtokenx_migrate"
database_name = "gridtokenx"
host = "postgres"
port = 5432
role = "primary"
pooler_mode = "session"
pool_size = 3
min_pool_size = 1

[[databases]]
name = "gridtokenx_noti"
host = "postgres"
port = 5432
role = "primary"
pooler_mode = "transaction"

# Alias for noti-service's `just noti-migrate*` (sqlx-cli) step only — same
# physical DB as "gridtokenx_noti".
[[databases]]
name = "gridtokenx_noti_migrate"
database_name = "gridtokenx_noti"
host = "postgres"
port = 5432
role = "primary"
pooler_mode = "session"
pool_size = 3
min_pool_size = 1
