[databases]
gridtokenx = host=postgres port=5432 dbname=gridtokenx
gridtokenx_noti = host=postgres port=5432 dbname=gridtokenx_noti

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
ignore_startup_parameters = extra_float_digits
admin_users = gridtokenx_user
