# Dev override: hot-reload the Aggregator Bridge with cargo-watch instead of a
# full `docker compose build` per Rust change.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d aggregator-bridge
#   # or: just bridge-dev
#
# Swaps the distroless prod build for a small dev image (Rust toolchain + native
# build deps + cargo-watch, baked once and cached — see Dockerfile.dev) and runs
# the bridge under cargo-watch (debug profile — fast compile). All base config
# (env, ports, network, depends_on) is merged from docker-compose.yml; only the
# build pipeline + command + volumes are swapped. The whole repo is bind-mounted
# at /app, so source + the sibling crates it depends on + infra/certs are live. A
# persistent target/ + cargo-home volume makes edits recompile incrementally.
#
# First boot = a cold debug build (~minutes). After that, save a .rs file and the
# binary rebuilds + reruns in seconds with no Docker involved. `just bridge-prod`
# reverts to the normal built image.

services:
  aggregator-bridge:
    build:
      context: ./
      dockerfile: gridtokenx-aggregator-bridge/Dockerfile.dev
    image: gridtokenx-aggregator-bridge-dev
    working_dir: /app/gridtokenx-aggregator-bridge
    environment:
      # Trim peak compile memory + speed: fewer parallel rustc jobs and line-table
      # debuginfo (backtraces still work) — the prod 768M limit OOM-kills a full
      # debug build otherwise.
      CARGO_BUILD_JOBS: "4"
      CARGO_PROFILE_DEV_DEBUG: "1"
      CARGO_INCREMENTAL: "1"
    # Compiling needs far more RAM than the prod runtime; lift the limit.
    deploy:
      resources:
        limits:
          memory: 8G
    # `exec` so signals reach cargo-watch for a clean shutdown.
    command:
      - bash
      - -c
      - exec cargo watch --why -x 'run --bin gridtokenx-aggregator-bridge'
    volumes:
      # Whole monorepo: bridge source + sibling crates + infra/certs, live.
      - ./:/app:cached
      # Persistent build cache so edits compile incrementally across restarts.
      # Only the registry sub-path is volumed — mounting all of /usr/local/cargo
      # would hide the cargo-watch binary baked into /usr/local/cargo/bin.
      - bridge-dev-target:/app/gridtokenx-aggregator-bridge/target
      - bridge-dev-cargo:/usr/local/cargo/registry

volumes:
  bridge-dev-target:
  bridge-dev-cargo:
